<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Venets Flowers</title>
<meta name="theme-color" content="#090910">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#090910;--bg2:#11111c;--bg3:#181825;--card:#13131f;--card2:#1a1a28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --txt:#eeeef8;--txt2:#8888aa;--txt3:#44445a;
  --accent:#7c3aed;--accent2:#a855f7;--accentL:rgba(124,58,237,0.15);
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--pink:#ec4899;
  --yellow:#fbbf24;--orange:#f97316;
  --r:14px;--r2:22px;--r3:28px;
  --sb:env(safe-area-inset-bottom,16px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
html,body{height:100%;background:var(--bg);color:var(--txt);overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;}

/* Скроллбар */
::-webkit-scrollbar{width:2px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Градиентный текст (имя + рамки) */
@keyframes gsh{0%{background-position:0%}100%{background-position:300%}}
.gtxt{
  background:linear-gradient(90deg,#c084fc,#fbbf24,#4ade80,#f87171,#a78bfa,#c084fc);
  background-size:300%;animation:gsh 4s linear infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.gborder{
  border:2px solid transparent!important;
  background:linear-gradient(var(--card),var(--card)) padding-box,
    linear-gradient(90deg,#c084fc,#fbbf24,#4ade80,#f87171,#a78bfa,#c084fc) border-box!important;
  background-size:auto,300%!important;
  animation:gsh 4s linear infinite!important;
}

/* Стеклянная кнопка (iOS активация) */
.glass-btn{
  background:rgba(59,130,246,0.12);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1.5px solid rgba(96,165,250,0.35);color:#60a5fa;
  border-radius:16px;padding:17px 32px;font-size:17px;font-weight:700;
  cursor:pointer;transition:all .2s;width:100%;text-align:center;
}
.glass-btn:active{transform:scale(.97);opacity:.8;}

/* Зелёная рамка (анимация после ввода) */
@keyframes greenBorder{from{box-shadow:0 0 0 0 rgba(34,197,94,0)}to{box-shadow:0 0 0 4px rgba(34,197,94,0.2)}}
.inp-valid{border-color:var(--green)!important;animation:greenBorder .4s forwards;}

/* Основная раскладка */
.screen{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* Нижняя навигация */
.nav{
  background:rgba(9,9,16,0.94);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border-top:1px solid var(--border);
  padding:6px 0 calc(6px + var(--sb));
  display:flex;z-index:90;
}
.nav-it{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;cursor:pointer;transition:all .2s;}
.nav-ic{font-size:24px;transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.nav-lb{font-size:10px;color:var(--txt3);font-weight:700;transition:color .2s;letter-spacing:.3px;}
.nav-it.on .nav-lb{color:var(--accent2);}
.nav-it.on .nav-ic{transform:scale(1.18);}

/* Шапка */
.hdr{
  padding:14px 16px 10px;display:flex;align-items:center;gap:10px;
  background:rgba(9,9,16,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;
}
.hdr-title{font-size:22px;font-weight:800;flex:1;}

/* Пилюли фильтр/сортировка */
.frow{display:flex;gap:8px;padding:10px 14px 4px;}
.fpill{
  display:flex;align-items:center;gap:5px;padding:9px 14px;
  border-radius:100px;border:1.5px solid var(--border2);
  background:var(--card);font-size:13px;font-weight:700;
  cursor:pointer;color:var(--txt2);transition:all .25s;
}
.fpill.on{border-color:var(--accent);color:var(--accent2);background:var(--accentL);}

/* Сетка товаров */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:8px 12px 130px;}

/* Карточка товара */
.pcard{
  background:var(--card);border-radius:var(--r2);overflow:hidden;
  border:1px solid var(--border);cursor:pointer;
  transition:transform .18s,box-shadow .18s;
}
.pcard:active{transform:scale(.96);}
.pimg{width:100%;aspect-ratio:1;background:var(--bg3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.pimg-e{font-size:52px;transition:transform .3s;display:block;}
.pcard:hover .pimg-e{transform:scale(1.1);}
.ptags{position:absolute;top:8px;left:7px;display:flex;flex-wrap:wrap;gap:3px;max-width:92%;}
.tag{font-size:9px;font-weight:800;padding:3px 7px;border-radius:100px;letter-spacing:.2px;line-height:1.3;}
.pinfo{padding:9px 10px 11px;}
.pname{font-size:12px;font-weight:700;line-height:1.35;color:var(--txt);margin-bottom:7px;}
.pbottom{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.pprice{font-size:14px;font-weight:800;}
.abtn{
  background:var(--accent);color:#fff;border:none;border-radius:100px;
  padding:6px 11px;font-size:11px;font-weight:800;cursor:pointer;
  transition:all .18s;white-space:nowrap;flex-shrink:0;
}
.abtn:active{transform:scale(.9);}
.qpill{display:flex;align-items:center;gap:7px;background:var(--accent);border-radius:100px;padding:4px 10px;flex-shrink:0;}
.qbtn{background:none;border:none;color:#fff;font-size:15px;cursor:pointer;padding:0 2px;font-weight:800;line-height:1;}
.qcnt{font-size:12px;font-weight:800;color:#fff;}

/* Корзина FAB */
.cfab{
  position:fixed;bottom:calc(80px + var(--sb));right:16px;z-index:200;
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;
  box-shadow:0 6px 28px rgba(124,58,237,.45);
  border:none;transition:transform .18s;
}
.cfab:active{transform:scale(.9);}
.cbadge{
  position:absolute;top:-3px;right:-3px;
  background:var(--red);color:#fff;border-radius:50%;
  min-width:19px;height:19px;font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);
}

/* Оверлей и шторки */
.overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fdIn .2s ease;
}
.overlay.ctr{align-items:center;}
@keyframes fdIn{from{opacity:0}to{opacity:1}}
.sheet{
  background:var(--bg2);border-radius:28px 28px 0 0;
  width:100%;max-height:91vh;overflow-y:auto;
  padding:0 0 calc(20px + var(--sb));
  animation:slUp .32s cubic-bezier(.32,.72,0,1);
}
@keyframes slUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shdl{width:38px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 18px;}
.modal{
  background:var(--bg2);border-radius:var(--r3);
  padding:28px 22px;width:calc(100% - 32px);max-width:390px;
  animation:popIn .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}

/* Поля ввода */
.inp{
  background:var(--bg3);border:1.5px solid var(--border2);border-radius:var(--r);
  padding:14px 16px;font-size:16px;color:var(--txt);width:100%;
  outline:none;transition:border-color .25s,box-shadow .25s;-webkit-appearance:none;
}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,58,237,.18);}
.inp::placeholder{color:var(--txt3);}
.inplb{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:5px;letter-spacing:.3px;}

/* OTP / телефон */
.otp-row{display:flex;gap:7px;justify-content:center;}
.otp-box{
  width:41px;height:50px;background:var(--bg3);border:2px solid var(--border2);
  border-radius:11px;font-size:20px;font-weight:800;text-align:center;
  color:var(--txt);outline:none;transition:border-color .2s;-webkit-appearance:none;
}
.otp-box:focus{border-color:var(--accent);}
.otp-box.ok{border-color:var(--green);color:var(--green);}

/* Рулетка */
.roul-wrap{
  position:relative;overflow:hidden;border-radius:18px;
  background:var(--bg3);border:1px solid var(--border2);
}
.roul-track{display:flex;will-change:transform;}
.roul-item{
  min-width:108px;height:108px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;flex-shrink:0;
  border-radius:14px;margin:6px 4px;
  background:var(--card);border:2px solid var(--border);
  transition:border-color .2s;
}
.roul-item.win{border-color:var(--green)!important;background:rgba(34,197,94,.1)!important;}
.roul-ptr{
  position:absolute;top:4px;bottom:4px;left:50%;transform:translateX(-50%);
  width:116px;border:2.5px solid var(--accent2);border-radius:18px;
  pointer-events:none;
  box-shadow:0 0 24px rgba(168,85,247,.5),inset 0 0 16px rgba(168,85,247,.08);
}

/* Список пунктов */
.lit{
  display:flex;align-items:center;padding:15px 18px;gap:13px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;
}
.lit:active{background:var(--bg3);}
.lit:last-child{border-bottom:none;}
.lic{font-size:21px;width:26px;text-align:center;}
.lil{flex:1;font-size:15px;font-weight:600;}
.lia{color:var(--txt3);font-size:16px;}
.lit.dis{opacity:.35;pointer-events:none;}

/* Секция (карточка со списком) */
.sec{background:var(--card);border-radius:var(--r2);margin:10px 14px;overflow:hidden;border:1px solid var(--border);}

/* Баланс */
.bal-row{display:flex;gap:10px;padding:0 14px 14px;}
.bal-card{flex:1;padding:16px;border-radius:20px;text-align:center;}

/* FAQ аккордеон */
.faq-it{border-bottom:1px solid var(--border);}
.faq-btn{
  width:100%;text-align:left;padding:15px 18px;
  background:none;border:none;color:var(--txt);font-size:14px;
  font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.faq-cnt{overflow:hidden;max-height:0;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
.faq-cnt.open{max-height:200px;}
.faq-txt{padding:0 18px 14px;color:var(--txt2);font-size:13px;line-height:1.65;}
.faq-arr{transition:transform .3s;display:inline-block;color:var(--txt3);}
.faq-arr.open{transform:rotate(90deg);}

/* Онбординг страницы */
.obd{
  position:fixed;inset:0;z-index:500;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;
  padding:50px 24px 40px;animation:fdIn .4s ease;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.obd-title{font-size:30px;font-weight:900;text-align:center;line-height:1.2;margin-bottom:10px;}
.obd-sub{font-size:15px;color:var(--txt2);text-align:center;line-height:1.6;}

/* Переключатель */
.tog{
  width:44px;height:26px;border-radius:13px;background:var(--bg3);
  position:relative;cursor:pointer;transition:background .22s;
  border:none;flex-shrink:0;
}
.tog.on{background:var(--green);}
.tog-k{
  position:absolute;top:3px;left:3px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:transform .22s;
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.tog.on .tog-k{transform:translateX(18px);}

/* Уведомление */
.notif{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);
  background:var(--card2);border:1px solid var(--border2);
  border-radius:var(--r);padding:11px 20px;font-size:14px;font-weight:700;
  z-index:999;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  animation:notifIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes notifIn{from{transform:translateX(-50%) translateY(-14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* Детальная страница */
.det-img{
  width:100%;aspect-ratio:1;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:86px;position:relative;
}
.back-btn{
  position:absolute;top:14px;left:14px;z-index:10;
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
  border:none;color:#fff;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* Ранжирование (слайдер) */
.rtrack{position:relative;height:4px;background:var(--bg3);border-radius:2px;margin:18px 0;}
.rfill{position:absolute;height:100%;background:var(--accent);border-radius:2px;}
input[type=range]{
  position:absolute;top:50%;transform:translateY(-50%);
  width:100%;-webkit-appearance:none;background:transparent;pointer-events:auto;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;
  border-radius:50%;background:var(--accent2);
  border:3px solid var(--bg);cursor:pointer;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
}

/* Таб-бар внутри шторки */
.tbar{display:flex;background:var(--bg3);border-radius:12px;padding:3px;margin:0 16px 14px;}
.titem{flex:1;padding:8px;text-align:center;border-radius:10px;font-size:13px;font-weight:700;color:var(--txt2);cursor:pointer;transition:all .2s;}
.titem.on{background:var(--card);color:var(--txt);}

/* Статусы заказов */
.ostatus{display:inline-block;padding:3px 11px;border-radius:100px;font-size:11px;font-weight:800;}

/* Страница профиля без авторизации */
.reg-banner{
  margin:22px 14px;padding:22px;border-radius:var(--r3);
  text-align:center;background:var(--card);
}

/* Подарок рулетки */
.prize-show{
  background:linear-gradient(135deg,rgba(34,197,94,.15),rgba(74,222,128,.08));
  border:2px solid var(--green);border-radius:22px;
  padding:28px;text-align:center;margin:0 16px;
}

/* Звёзды */
.stars{color:#fbbf24;font-size:15px;}

/* Кнопка отправки с стрелкой (iOS iMessage) */
.send-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--accent);border:none;color:#fff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.send-btn:active{transform:scale(.9);}

/* Прогресс кэшбека */
.prog-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .5s ease;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.loading{animation:pulse 1.2s infinite;}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.float{animation:float 2.5s ease-in-out infinite;}

/* Страница "Корзина" */
.ci{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid var(--border);}
.ci-e{font-size:30px;width:44px;text-align:center;}
.ci-n{flex:1;font-size:13px;font-weight:700;line-height:1.35;}
.ci-p{font-size:13px;font-weight:800;color:var(--accent2);white-space:nowrap;}

/* Пилюли тегов (фильтр) */
.tpill{
  white-space:nowrap;padding:7px 14px;border-radius:100px;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .22s;
  border:1.5px solid var(--border2);color:var(--txt2);background:var(--card);flex-shrink:0;
}
.tpill.on{background:var(--accent);border-color:var(--accent);color:#fff;}

/* Разделитель */
.divider{height:1px;background:var(--border);margin:0;}

/* Стрелка назад */
.arr-back{
  background:none;border:none;color:var(--accent2);
  font-size:17px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:4px;
}

/* Страница детали — нижняя полоска */
.det-bottom{
  padding:14px 18px calc(14px + var(--sb));
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ==================== TELEGRAM WEBAPP ====================
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#090910');
  tg.setBackgroundColor('#090910');
}
function getTgUser() {
  if (!tg?.initDataUnsafe?.user) return null;
  const u = tg.initDataUnsafe.user;
  return {
    name: u.first_name + (u.last_name ? ' ' + u.last_name : ''),
    username: u.username || '',
    id: u.id,
  };
}

// ==================== ДАННЫЕ ====================
const FLOWERS = [
  {id:1,type:'Роза',pln:'Playa Blanca',h:60,color:'Красный',price:3200,e:'🌹',tags:['Любимой','Ароматные'],desc:'Насыщенная красная роза с глубоким ароматом. Выращена на высокогорных плантациях Эквадора.',rating:4.9,sold:342},

  {id:3,type:'Пионы',pln:'Pink Floyd',h:55,color:'Розовый',price:5500,e:'🌸',tags:['Для мамы','Ароматные','Скидка'],desc:'Пышные розовые пионы с тонким нежным ароматом. Настоящий шедевр природы.',rating:5.0,sold:389},
  {id:4,type:'Хризантема',pln:'Vendela',h:50,color:'Жёлтый',price:2800,e:'🌼',tags:['Крупные','Короткие'],desc:'Яркая солнечная хризантема. Долго стоит в вазе, поднимает настроение.',rating:4.7,sold:156},
  {id:5,type:'Роза',pln:'Pink Floyd',h:90,color:'Лиловый',price:4800,e:'💜',tags:['Высокие','Той самой'],desc:'Редкий лиловый сорт. Завораживающий цвет и неповторимый аромат.',rating:4.9,sold:98},
  {id:6,type:'Пионы',pln:'Playa Blanca',h:70,color:'Кремовый',price:6200,e:'🌺',tags:['Крупные','Для мамы','Ароматные'],desc:'Кремовые пионы — роскошь и нежность в каждом лепестке.',rating:5.0,sold:267},
  {id:7,type:'Хризантема',pln:'Pink Floyd',h:65,color:'Розовый',price:2900,e:'🌷',tags:['Скидка','Короткие'],desc:'Нежная розовая хризантема по специальной цене. Отличный выбор!',rating:4.6,sold:445},
  {id:8,type:'Роза',pln:'Vendela',h:100,color:'Оранжевый',price:5300,e:'🧡',tags:['Высокие','Крупные'],desc:'Величественная оранжевая роза 100 см. Производит незабываемое впечатление.',rating:4.8,sold:134},
];

const GIFTS = [
  {id:101,type:'Конфеты',name:'Raffaello Box',price:1200,e:'🍬',tags:['Вкусно','Той самой','Сладкоежке'],desc:'Коробка изысканных конфет Raffaello. Классика итальянского вкуса.',rating:4.9,sold:523,vegan:false,halal:true,noNuts:false},

// ==================== УТИЛИТЫ ====================
function h(tag,attrs={},children=[]){
  const el = document.createElement(tag);
  for(const[k,v] of Object.entries(attrs)){
    if(k==='class') el.className=v;
    else if(k==='style') el.style.cssText=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of children){
    if(typeof c==='string') el.appendChild(document.createTextNode(c));
    else if(c) el.appendChild(c);
  }
  return el;
}
function t(text){ return document.createTextNode(text); }

function notif(msg, ico='✅'){
  clearTimeout(S._nT);
  S.notif={msg,ico};
  render();
  S._nT=setTimeout(()=>{S.notif=null;render();},2600);
}

function cartCount(){ return Object.values(S.cart).reduce((a,b)=>a+b,0); }
function cartTotal(){
  return Object.entries(S.cart).reduce((sum,[id,qty])=>{
    const p=[...FLOWERS,...GIFTS].find(f=>f.id==id);
    return sum+(p?p.price*qty:0);
  },0);
}
function addCart(id){
  if(!S.user){notif('Войдите в аккаунт','⚠️');return;}
  S.cart[id]=(S.cart[id]||0)+1;save();
}
function remCart(id){
  if(S.cart[id]>1)S.cart[id]--;
  else delete S.cart[id];
  save();
}
function flowerName(f){ return `${f.type} ${f.pln} ${f.h}см`; }

// ==================== РЕНДЕР ====================
function render(){
  const app = document.getElementById('app');
  app.innerHTML='';
  app.appendChild(build());
}

function build(){
  const wrap = h('div',{style:'height:100%;display:flex;flex-direction:column;'});

  // Уведомление
  if(S.notif){
    wrap.appendChild(h('div',{class:'notif'},[
      t(S.notif.ico+' '+S.notif.msg)
    ]));
  }

  // Онбординг
  if(S.onboard){ wrap.appendChild(buildOnboard()); return wrap; }
  // Логин админа
  if(S.adminLogin){ wrap.appendChild(buildAdminLogin()); return wrap; }
  // Панель админа
  if(S.adminMode){ wrap.appendChild(buildAdmin()); return wrap; }
  // Детальная страница
  if(S.detail){ wrap.appendChild(buildDetail(S.detail,S.detSec)); return wrap; }
  // Подраздел профиля
  if(S.profSec){ wrap.appendChild(buildProfSec(S.profSec)); return wrap; }

  const screen = h('div',{class:'screen'});

  if(S.tab===0) screen.appendChild(buildFlowers());
  else if(S.tab===1) screen.appendChild(buildGifts());
  else screen.appendChild(buildProfile());

  // FAB корзина
  if(S.tab<2){
    const cnt=cartCount();
    const fab=h('button',{class:'cfab',onClick:()=>{S.cartOpen=true;render();}},[t('🛒')]);
    if(cnt>0) fab.appendChild(h('div',{class:'cbadge'},[t(cnt)]));
    screen.appendChild(fab);
  }

  if(S.cartOpen) screen.appendChild(buildCart());
  if(S.filterOpen) screen.appendChild(buildFilterSheet());
  if(S.sortOpen) screen.appendChild(buildSortSheet());

  screen.appendChild(buildNav());
  wrap.appendChild(screen);
  return wrap;
}

// ==================== НАВИГАЦИЯ ====================
function buildNav(){
  const nav=h('div',{class:'nav'});
  [['🌸','Цветы'],['🎁','Подарки'],['•••','Профиль']].forEach(([ic,lb],i)=>{
    const it=h('div',{class:'nav-it'+(S.tab===i?' on':''),onClick:()=>{S.tab=i;S.filterOpen=false;S.sortOpen=false;render();}});
    it.appendChild(h('div',{class:'nav-ic'},[t(ic)]));
    it.appendChild(h('div',{class:'nav-lb'},[t(lb)]));
    nav.appendChild(it);
  });
  return nav;
}

// ==================== ЦВЕТЫ ====================
function buildFlowers(){
  const wrap=h('div',{style:'display:flex;flex-direction:column;height:100%;overflow:hidden;'});
  wrap.appendChild(h('div',{class:'hdr'},[h('div',{class:'hdr-title'},[t('🌸 Цветы')])]));
  const scr=h('div',{class:'scr'});
  scr.appendChild(buildFSRow());

  let items=[...FLOWERS];
  const f=S.ff;
  if(f.type.length) items=items.filter(i=>f.type.includes(i.type));
  if(f.minP||f.maxP<10000) items=items.filter(i=>i.price>=f.minP&&i.price<=f.maxP);
  if(f.minH>50||f.maxH<100) items=items.filter(i=>i.h>=f.minH&&i.h<=f.maxH);
  items=sortItems(items);

  const grid=h('div',{class:'pgrid'});
  items.forEach(p=>grid.appendChild(buildCard(p,'flowers')));
  scr.appendChild(grid);
  wrap.appendChild(scr);
  return wrap;
}

// ==================== ПОДАРКИ ====================
function buildGifts(){
  const wrap=h('div',{style:'display:flex;flex-direction:column;height:100%;overflow:hidden;'});
  wrap.appendChild(h('div',{class:'hdr'},[h('div',{class:'hdr-title'},[t('🎁 Подарки')])]));
  const scr=h('div',{class:'scr'});
  scr.appendChild(buildFSRow());

  let items=[...GIFTS];
  const f=S.gf;
  if(f.type) items=items.filter(i=>i.type===f.type);
  if(f.vegan) items=items.filter(i=>i.vegan);
  if(f.halal) items=items.filter(i=>i.halal);
  if(f.noNuts) items=items.filter(i=>i.noNuts);
  if(f.minP||f.maxP<5000) items=items.filter(i=>i.price>=f.minP&&i.price<=f.maxP);
  items=sortItems(items);

  const grid=h('div',{class:'pgrid'});
  items.forEach(p=>grid.appendChild(buildCard(p,'gifts')));
  scr.appendChild(grid);
  wrap.appendChild(scr);
  return wrap;
}

function sortItems(items){
  if(S.sortBy==='cheap') return items.sort((a,b)=>a.price-b.price);
  if(S.sortBy==='exp') return items.sort((a,b)=>b.price-a.price);
  return items.sort((a,b)=>b.sold-a.sold);
}

function buildFSRow(){
  const row=h('div',{class:'frow'});
  const hasF=hasFilters();
  const sp=h('div',{class:'fpill'+(S.sortBy!=='popular'?' on':''),onClick:()=>{S.sortOpen=!S.sortOpen;S.filterOpen=false;render();}});
  sp.appendChild(t('↕ Сортировка'));
  const fp=h('div',{class:'fpill'+(hasF?' on':''),onClick:()=>{S.filterOpen=!S.filterOpen;S.sortOpen=false;render();}});
  fp.appendChild(t('⚙ Фильтры'+(hasF?' ●':'')));
  row.appendChild(sp);row.appendChild(fp);
  return row;
}

function hasFilters(){
  if(S.tab===0){const f=S.ff;return f.type.length||f.minP>0||f.maxP<10000||f.minH>50||f.maxH<100;}
  const f=S.gf;return f.type||f.vegan||f.halal||f.noNuts||f.minP>0||f.maxP<5000;
}

function buildCard(p,sec){
  const card=h('div',{class:'pcard',onClick:()=>{S.detail=p;S.detSec=sec;render();}});
  const qty=S.cart[p.id]||0;

  const img=h('div',{class:'pimg'});
  img.appendChild(h('span',{class:'pimg-e'},[t(p.e)]));

  const tags=h('div',{class:'ptags'});
  (p.tags||[]).slice(0,3).forEach(tg=>{
    const c=TAG_CLR[tg]||['#818cf8','#1e1b4b'];
    const tag=h('div',{class:'tag',style:`background:${c[0]}25;color:${c[0]};border:1px solid ${c[0]}45;`},[t(tg)]);
    tags.appendChild(tag);
  });
  img.appendChild(tags);
  card.appendChild(img);

  const info=h('div',{class:'pinfo'});
  const nm=h('div',{class:'pname'},[t(sec==='flowers'?flowerName(p):p.name)]);
  info.appendChild(nm);

  const bot=h('div',{class:'pbottom'});
  bot.appendChild(h('div',{class:'pprice'},[t(p.price.toLocaleString('ru')+' ₽')]));

  if(qty===0){
    const ab=h('button',{class:'abtn',onClick:(e)=>{e.stopPropagation();addCart(p.id);render();}},[t('+ Добавить')]);
    bot.appendChild(ab);
  }else{
    const qp=h('div',{class:'qpill'});
    const mi=h('button',{class:'qbtn',onClick:(e)=>{e.stopPropagation();remCart(p.id);render();}},[t('−')]);
    const pl=h('button',{class:'qbtn',onClick:(e)=>{e.stopPropagation();addCart(p.id);render();}},[t('+')]);
    qp.appendChild(mi);qp.appendChild(h('span',{class:'qcnt'},[t(qty)]));qp.appendChild(pl);
    bot.appendChild(qp);
  }
  info.appendChild(bot);
  card.appendChild(info);
  return card;
}

function buildRangeSection(title,min,max,valMin,valMax,unit,onChange){
  const sec=h('div',{style:'padding:0 16px 16px;'});
  const lbl=h('div',{class:'inplb'});
  lbl.textContent=`${title}: ${valMin.toLocaleString('ru')} – ${valMax.toLocaleString('ru')} ${unit}`;
  sec.appendChild(lbl);
  sec.appendChild(buildDualRange(min,max,valMin,valMax,onChange));
  return sec;
}

function buildDualRange(min,max,vMin,vMax,onChange){
  const wrap=h('div',{style:'position:relative;margin:8px 0 4px;'});
  const track=h('div',{class:'rtrack'});
  const fill=h('div',{class:'rfill'});
  const pMin=((vMin-min)/(max-min))*100;
  const pMax=((vMax-min)/(max-min))*100;
  fill.style.left=pMin+'%';fill.style.right=(100-pMax)+'%';
  track.appendChild(fill);

  const r1=h('input',{type:'range',min,max,value:vMin});
  const r2=h('input',{type:'range',min,max,value:vMax});
  r1.oninput=()=>{ if(+r1.value>+r2.value-((max-min)*0.05)) r1.value=+r2.value-((max-min)*0.05); onChange(+r1.value,+r2.value); };
  r2.oninput=()=>{ if(+r2.value<+r1.value+((max-min)*0.05)) r2.value=+r1.value+((max-min)*0.05); onChange(+r1.value,+r2.value); };
  track.appendChild(r1);track.appendChild(r2);
  wrap.appendChild(track);
  return wrap;
}

    onClick:()=>{S.cart={};save();render();S.cartOpen=true;}
  },[t('Очистить')]);

      const qp=h('div',{class:'qpill'});
      qp.appendChild(h('button',{class:'qbtn',onClick:()=>{remCart(id);render();S.cartOpen=true;}},[t('−')]));
      qp.appendChild(h('span',{class:'qcnt'},[t(String(qty))]));
      qp.appendChild(h('button',{class:'qbtn',onClick:()=>{addCart(id);render();S.cartOpen=true;}},[t('+')]));
      ci.appendChild(qp);
      sh.appendChild(ci);
    });

    const sum=h('div',{style:'padding:14px 18px;'});

    // Лепестки
    if(S.user&&S.user.petals>0){
      const pr=h('div',{style:'display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);'});
      pr.appendChild(h('div',{style:'font-size:13px;color:var(--txt2);'},[t('Использовать ☘️ лепестки: '+S.user.petals)]));
      const tog=h('button',{class:'tog'+(S.usePetals?' on':''),onClick:()=>{S.usePetals=!S.usePetals;render();S.cartOpen=true;}});
      tog.appendChild(h('div',{class:'tog-k'}));
      pr.appendChild(tog);sum.appendChild(pr);
    }

    const total=cartTotal();
    const disc=S.usePetals&&S.user?Math.min(S.user.petals,Math.floor(total*0.75)):0;

    [['Сумма заказа',total.toLocaleString('ru')+' ₽',false],
     disc?['Скидка ☘️','-'+disc.toLocaleString('ru')+' ₽',true]:null,
     ['Доставка','Бесплатно',false]].filter(Boolean).forEach(([k,v,gr])=>{
      const rw=h('div',{style:'display:flex;justify-content:space-between;align-items:center;padding:7px 0;'});
      rw.appendChild(h('div',{style:'font-size:13px;color:var(--txt2);'},[t(k)]));
      const vv=h('div',{style:'font-size:13px;font-weight:700;'+(gr?'color:var(--green);':'')});
      vv.textContent=v;rw.appendChild(vv);sum.appendChild(rw);
    });

    sum.appendChild(h('div',{style:'height:1px;background:var(--border);margin:8px 0;'}));

    trow.appendChild(h('div',{style:'font-size:16px;font-weight:800;'},[t('Итого')]));
    trow.appendChild(h('div',{style:'font-size:18px;font-weight:900;color:var(--accent2);'},[t((total-disc).toLocaleString('ru')+' ₽')]));
    sum.appendChild(trow);

    const oBtn=h('button',{
      style:'width:100%;margin-top:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--r);padding:16px;font-size:17px;font-weight:800;cursor:pointer;',
      onClick:()=>placeOrder(total-disc,disc)
    },[t('Оформить заказ 🌸')]);
    sum.appendChild(oBtn);
    sh.appendChild(sum);
  }
  ov.appendChild(sh);return ov;
}

function placeOrder(total,disc){
  const order={
    id:Date.now(),date:new Date().toLocaleDateString('ru'),
    items:{...S.cart},total,status:'В обработке',
    address:S.user.addr||'Не указан'
  };
  S.orders.unshift(order);
  if(!S.adminOrders) S.adminOrders=[];
  S.adminOrders.unshift({...order,userName:S.user.name,phone:S.user.phone});
  const earned=Math.floor(total*0.05);
  if(S.usePetals) S.user.petals=Math.max(0,(S.user.petals||0)-disc);
  S.user.petals=(S.user.petals||0)+earned;
  S.cart={};S.usePetals=false;save();
  S.cartOpen=false;
  notif('Заказ оформлен! +'+earned+' ☘️');
}

function buildObPhone(){
  const d=obWrap();
  d.appendChild(h('div',{class:'obd-title'},[t('Введите номер\nтелефона')]));
  d.appendChild(h('div',{class:'obd-sub',style:'margin-bottom:30px;'},[t('Укажи актуальный номер — он нужен\nдля связи по твоему заказу')]));

  const digits=['_','_','_','_','_','_','_','_','_','_'];
  let phoneStr='';

  const row=h('div',{class:'otp-row'});
  // +7 лейбл
  const prefix=h('div',{style:'font-size:20px;font-weight:800;padding:12px 6px;color:var(--txt2);'},[t('+7')]);
  row.appendChild(prefix);

  const boxes=[];
  for(let i=0;i<10;i++){
    const box=h('input',{class:'otp-box',type:'tel',maxlength:'1',inputmode:'numeric',placeholder:'•'});
    boxes.push(box);row.appendChild(box);
    box.addEventListener('input',()=>{
      if(box.value&&!/\d/.test(box.value)){box.value='';return;}
      if(box.value) box.classList.add('ok'); else box.classList.remove('ok');
      if(box.value&&i<9) boxes[i+1].focus();
      const filled=boxes.filter(b=>b.value).length;
      const allFilled=filled===10;
      cont.style.display=allFilled?'block':'none';
      phoneStr='+7'+boxes.map(b=>b.value).join('');
    });
    box.addEventListener('keydown',(e)=>{
      if(e.key==='Backspace'&&!box.value&&i>0) boxes[i-1].focus();
    });
  }

  const cont=h('button',{
    class:'glass-btn',
    style:'display:none;margin-top:28px;',
    onClick:()=>{S.phone=phoneStr;S.step=2;render();}
  },[t('Продолжить →')]);

  d.appendChild(row);d.appendChild(cont);
  return d;
}

function buildObRoulette(){
  const d=obWrap();
  d.appendChild(h('div',{class:'obd-title'},[t('Скидка на первый заказ')]));
  d.appendChild(h('div',{class:'obd-sub',style:'margin-bottom:22px;'},[t('Крути рулетку и узнай свою скидку!')]));

  if(S.spun&&S.spinResult){
    // Результат
    const pr=h('div',{class:'prize-show'});
    pr.appendChild(h('div',{style:'font-size:40px;margin-bottom:8px;'},[t('🎉')]));
    pr.appendChild(h('div',{style:'font-size:14px;color:var(--txt2);margin-bottom:6px;font-weight:700;'},[t('Твоя скидка:')]));
    pr.appendChild(h('div',{style:'font-size:44px;font-weight:900;color:var(--green);'},[t(S.spinResult.l)]));
    pr.appendChild(h('div',{style:'font-size:13px;color:var(--txt2);margin-top:6px;'},[t('☘️ +'+S.spinResult.v+' лепестков начислено')]));
    d.appendChild(pr);

    const btn=h('button',{
      class:'glass-btn',style:'margin-top:24px;',
      onClick:()=>{S.step=5;render();}
    },[t('Круто, спасибо! 🎊')]);
    d.appendChild(btn);
    return d;
  }

  // Рулетка
  const roulWrap=h('div',{class:'roul-wrap',style:'width:100%;'});
  const track=h('div',{class:'roul-track'});

  const repeated=[...ROUL,...ROUL,...ROUL,...ROUL];
  repeated.forEach(item=>{
    const el=h('div',{class:'roul-item'+(item.w?' win':' impossible')});
    el.appendChild(h('div',{style:'font-size:18px;margin-bottom:4px;'},[t(item.w?'🎁':'💎')]));
    el.appendChild(h('div',{style:'font-size:14px;font-weight:800;color:'+(item.w?'var(--green)':'var(--txt3)');'},[t(item.l)]));
    track.appendChild(el);
  });

  roulWrap.appendChild(track);
  roulWrap.appendChild(h('div',{class:'roul-ptr'}));
  d.appendChild(roulWrap);

  const spinBtn=h('button',{class:'glass-btn',style:'margin-top:20px;',
    onClick:()=>{
      spinBtn.disabled=true;spinBtn.style.opacity='.5';
      // Выбираем победный результат (из выигрышных)
      const winners=ROUL.filter(r=>r.w);
      const result=winners[Math.floor(Math.random()*winners.length)];
      const itemW=116; const totalW=repeated.length*itemW;
      const centerIdx=Math.floor(repeated.length/2)+Math.floor(Math.random()*6);
      // Подбираем итем с нужным значением
      let targetIdx=centerIdx;
      for(let i=centerIdx;i<repeated.length;i++){
        if(repeated[i].v===result.v&&repeated[i].w){targetIdx=i;break;}
      }
      const targetOffset=-(targetIdx*itemW-(roulWrap.clientWidth/2-itemW/2));

      // Анимация
      let pos=0;let speed=30;let dec=false;
      let startTime=null;const duration=3000;
      function animate(ts){
        if(!startTime)startTime=ts;
        const elapsed=ts-startTime;
        const progress=elapsed/duration;
        const ease=progress<0.7?progress*1.4:1-Math.pow((progress-0.7)/0.3,2)*0.5;
        const curPos=targetOffset*ease;
        track.style.transform=`translateX(${curPos}px)`;
        if(elapsed<duration) requestAnimationFrame(animate);
        else{
          track.style.transform=`translateX(${targetOffset}px)`;
          S.spinResult=result;S.spun=true;render();
        }
      }
      requestAnimationFrame(animate);
    }
  },[t('🎰 Крутить!')]);
  d.appendChild(spinBtn);
  return d;
}

  return page;
}

function buildAdminDash(){
  const d=h('div',{});
  const totalRev=([...S.orders,...(S.adminOrders||[])]).reduce((a,o)=>a+o.total,0);
  const usersCount=(S.adminUsers||[]).length+(S.user?1:0);

  const stats=[
    ['💰',totalRev.toLocaleString('ru')+' ₽','Выручка','var(--green)'],
    ['📦',([...S.orders,...(S.adminOrders||[])]).length,'Заказов','var(--blue)'],
    ['👥',usersCount,'Клиентов','var(--accent2)'],
    ['🌸',FLOWERS.length+GIFTS.length,'Товаров','var(--yellow)'],
  ];

  const grid=h('div',{style:'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;'});
  stats.forEach(([ic,val,lb,c])=>{
    const card=h('div',{style:'background:var(--card);border-radius:20px;padding:18px;border:1px solid var(--border);text-align:center;'});
    card.appendChild(h('div',{style:'font-size:28px;margin-bottom:6px;'},[t(ic)]));
    card.appendChild(h('div',{style:'font-size:22px;font-weight:900;color:'+c+';'},[t(String(val))]));
    card.appendChild(h('div',{style:'font-size:12px;color:var(--txt2);font-weight:700;margin-top:3px;'},[t(lb)]));
    grid.appendChild(card);
  });
  d.appendChild(grid);

  // Последние заказы
  d.appendChild(h('div',{style:'font-size:17px;font-weight:800;margin-bottom:10px;'},[t('Последние заказы')]));
  const allOrds=[...S.orders,...(S.adminOrders||[])].slice(0,5);
  if(!allOrds.length){
    d.appendChild(h('div',{style:'color:var(--txt3);font-size:14px;'},[t('Нет заказов')]));
  }else{
    const sec=h('div',{class:'sec'});
    allOrds.forEach(o=>{
      const it=h('div',{class:'lit'});
      const inf=h('div',{style:'flex:1;'});
      inf.appendChild(h('div',{style:'font-size:13px;font-weight:700;'},[t('#'+o.id+' · '+(o.userName||S.user?.name||'—'))]));
      inf.appendChild(h('div',{style:'font-size:11px;color:var(--txt3);'},[t(o.date+' · '+o.status)]));
      it.appendChild(inf);
      it.appendChild(h('div',{style:'font-size:14px;font-weight:800;color:var(--accent2);'},[t(o.total.toLocaleString('ru')+'₽')]));
      sec.appendChild(it);
    });
    d.appendChild(sec);
  }
  return d;
}

function buildAdminUsers(){
  const d=h('div',{});
  d.appendChild(h('div',{style:'font-size:20px;font-weight:800;margin-bottom:14px;'},[t('👥 Клиенты')]));
  const users=[...(S.adminUsers||[])];
  if(S.user&&!users.find(u=>u.phone===S.user.phone)) users.unshift({...S.user,id:Date.now(),regDate:new Date().toLocaleDateString('ru')});
  if(!users.length){
    d.appendChild(h('div',{style:'color:var(--txt3);'},[t('Нет клиентов')]));return d;
  }
  const sec=h('div',{class:'sec'});
  users.forEach(u=>{
    const it=h('div',{class:'lit'});
    const ava=h('div',{style:'width:36px;height:36px;border-radius:50%;background:var(--accentL);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;'},[t('👤')]);
    const inf=h('div',{style:'flex:1;'});
    inf.appendChild(h('div',{style:'font-size:14px;font-weight:700;'},[t(u.name||'Пользователь')]));
    inf.appendChild(h('div',{style:'font-size:12px;color:var(--txt3);'},[t(u.phone||'—')+' · '+t(u.regDate||'—')]));
    const bals=h('div',{style:'text-align:right;'});
    bals.appendChild(h('div',{style:'font-size:12px;color:var(--green);font-weight:700;'},[t('☘️'+(u.petals||0))]));
    bals.appendChild(h('div',{style:'font-size:12px;color:var(--pink);font-weight:700;'},[t('🌹'+(u.buds||0))]));
    it.appendChild(ava);it.appendChild(inf);it.appendChild(bals);
    sec.appendChild(it);
  });
  d.appendChild(sec);
  return d;
}

function buildAdminOrders(){
  const d=h('div',{});
  d.appendChild(h('div',{style:'font-size:20px;font-weight:800;margin-bottom:14px;'},[t('📦 Заказы')]));
  const allOrds=[...S.orders,...(S.adminOrders||[])];
  if(!allOrds.length){d.appendChild(h('div',{style:'color:var(--txt3);'},[t('Нет заказов')]));return d;}
  const colors={'В обработке':['var(--yellow)','rgba(251,191,36,.15)'],'Доставляется':['var(--blue)','rgba(59,130,246,.15)'],'Доставлен':['var(--green)','rgba(34,197,94,.15)'],'Отменён':['var(--red)','rgba(239,68,68,.15)']};
  const statuses=['В обработке','Доставляется','Доставлен','Отменён'];
  allOrds.forEach(o=>{
    const c=colors[o.status]||['var(--txt3)','var(--bg3)'];
    const card=h('div',{style:'background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid var(--border);'});
    const top=h('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;'});
    top.appendChild(h('div',{style:'font-size:13px;font-weight:700;'},[t('#'+o.id+' · '+(o.userName||S.user?.name||'—'))]));
    top.appendChild(h('div',{style:'font-size:14px;font-weight:900;color:var(--accent2);'},[t(o.total.toLocaleString('ru')+'₽')]));
    card.appendChild(top);
    // Смена статуса
    const stRow=h('div',{style:'display:flex;gap:5px;flex-wrap:wrap;'});
    statuses.forEach(st=>{
      const btn=h('button',{
        style:'padding:4px 8px;border-radius:100px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid '+(o.status===st?c[0]:'var(--border)')+';background:'+(o.status===st?c[1]:'transparent')+';color:'+(o.status===st?c[0]:'var(--txt3)')+';',
        onClick:()=>{o.status=st;save();notif('Статус обновлён');render();}
      },[t(st)]);
      stRow.appendChild(btn);
    });
    card.appendChild(stRow);
    d.appendChild(card);
  });
  return d;
}

function buildAdminProducts(){
  const d=h('div',{});
  d.appendChild(h('div',{style:'font-size:20px;font-weight:800;margin-bottom:14px;'},[t('🌸 Товары')]));
  const tbar=h('div',{style:'display:flex;gap:8px;margin-bottom:14px;'});
  ['Все','Цветы','Подарки'].forEach((lb,i)=>{
    const b=h('div',{class:'tpill'+((!S._prodTab&&i===0)||S._prodTab===i?' on':''),
      onClick:()=>{S._prodTab=i;render();}});
    b.textContent=lb;tbar.appendChild(b);
  });
  d.appendChild(tbar);
  const items=(S._prodTab===1?FLOWERS:S._prodTab===2?GIFTS:[...FLOWERS,...GIFTS]);
  const sec=h('div',{class:'sec'});
  items.forEach(p=>{
    const it=h('div',{class:'lit'});
    it.appendChild(h('div',{style:'font-size:24px;width:32px;text-align:center;'},[t(p.e)]));
    const inf=h('div',{style:'flex:1;'});
    inf.appendChild(h('div',{style:'font-size:13px;font-weight:700;'},[t(p.type==='Роза'||p.type==='Пионы'||p.type==='Хризантема'?flowerName(p):p.name)]));
    inf.appendChild(h('div',{style:'font-size:11px;color:var(--txt3);'},[t(p.sold+' продаж')]));
    it.appendChild(inf);
    const price=h('div',{style:'text-align:right;'});
    price.appendChild(h('div',{style:'font-size:13px;font-weight:800;color:var(--accent2);'},[t(p.price.toLocaleString('ru')+'₽')]));
    price.appendChild(h('div',{style:'font-size:11px;color:var(--txt3);'},[t('★'+p.rating)]));
    it.appendChild(price);
    sec.appendChild(it);
  });
  d.appendChild(sec);
  return d;
}

function buildAdminSettings(){
  const d=h('div',{});
  d.appendChild(h('div',{style:'font-size:20px;font-weight:800;margin-bottom:14px;'},[t('⚙️ Настройки')]));
  const sec=h('div',{class:'sec'});
  const settings=[
    ['🔔','Push-уведомления',true],['🎁','Реферальная программа',true],
    ['💳','Вывод бутонов',true],['🔄','Обмен баллов',true],
  ];
  settings.forEach(([ic,lb,val])=>{
    const it=h('div',{class:'lit'});
    it.appendChild(h('div',{class:'lic'},[t(ic)]));
    it.appendChild(h('div',{class:'lil'},[t(lb)]));
    const tog=h('button',{class:'tog on'});tog.appendChild(h('div',{class:'tog-k'}));
    tog.onclick=()=>{tog.classList.toggle('on');};
    it.appendChild(tog);sec.appendChild(it);
  });
  d.appendChild(sec);

  // Сброс данных
  d.appendChild(h('div',{style:'margin-top:18px;'}));
  const resetBtn=h('button',{
    style:'width:100%;background:rgba(239,68,68,.1);border:1.5px solid var(--red);border-radius:var(--r);padding:14px;color:var(--red);font-size:15px;font-weight:800;cursor:pointer;',
    onClick:()=>{
      if(confirm('Сбросить все данные?')){
        localStorage.removeItem('venets');
        S.user=null;S.cart={};S.orders=[];S.adminUsers=[];S.adminOrders=[];
        S.adminMode=false;notif('Данные сброшены','🗑️');render();
      }
    }
  },[t('Сбросить все данные')]);
  d.appendChild(resetBtn);
  return d;
}

// ==================== ЗАПУСК ====================
render();
</script>
</body>
</html>
