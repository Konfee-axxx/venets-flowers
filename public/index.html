<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000008">
<title>Venets Flowers</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
:root{
  --bg:#000008;--bg2:#08080f;--bg3:#0f0f1a;
  --glass:rgba(255,255,255,0.07);--glass2:rgba(255,255,255,0.12);
  --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
  --txt:#f0f0ff;--txt2:#8080aa;--txt3:#404060;
  --green:#30d158;--blue:#0a84ff;--pink:#ff375f;--gold:#ffd60a;
  --accent:#bf5af2;--safe-b:env(safe-area-inset-bottom,0px);
  --blur:blur(40px) saturate(180%);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,'SF Pro Display',system-ui,sans-serif;overflow:hidden;touch-action:pan-y;}
::-webkit-scrollbar{width:0;height:0;}

/* ═══ LIQUID GLASS ═══ */
.glass{
  background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,rgba(255,255,255,0.04) 100%);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(0,0,0,0.15),0 8px 32px rgba(0,0,0,0.4);
}
.btn-glass{
  width:100%;padding:17px;border-radius:20px;border:none;
  font-size:17px;font-weight:700;cursor:pointer;color:#4ab5ff;
  background:linear-gradient(135deg,rgba(10,132,255,0.2),rgba(10,132,255,0.08));
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(10,132,255,0.35);
  box-shadow:inset 0 1px 0 rgba(10,132,255,0.3),inset 0 -1px 0 rgba(0,0,0,0.2),0 4px 20px rgba(10,132,255,0.2);
  transition:all .2s;
}
.btn-glass:active{transform:scale(.97);opacity:.85;}
.btn-prim{
  width:100%;padding:17px;border-radius:20px;border:none;
  font-size:17px;font-weight:700;cursor:pointer;color:#fff;
  background:linear-gradient(135deg,rgba(191,90,242,0.9),rgba(255,55,95,0.85));
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.25),inset 0 -1px 0 rgba(0,0,0,0.2),0 8px 30px rgba(191,90,242,0.4);
  transition:all .2s;
}
.btn-prim:active{transform:scale(.97);}
.btn-prim:disabled,.btn-prim[disabled]{opacity:.4;pointer-events:none;}

/* ═══ ГРАДИЕНТ ═══ */
@keyframes gradFlow{0%{background-position:0%}100%{background-position:400%}}
/* градиент имени 24 сек */
.grad-text{animation:gradFlow 24s linear infinite!important;}
.grad-text{
  background:linear-gradient(90deg,#bf5af2,#ffd60a,#30d158,#ff375f,#0a84ff,#bf5af2);
  background-size:400%;animation:gradFlow 14s linear infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.grad-border{
  border:1.5px solid transparent!important;
  background:linear-gradient(var(--bg3),var(--bg3)) padding-box,
    linear-gradient(90deg,#bf5af2,#ffd60a,#30d158,#ff375f,#0a84ff,#bf5af2) border-box;
  background-size:auto,400%;animation:gradFlow 14s linear infinite;
}

/* ═══ АНИМАЦИИ ═══ */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fdIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-40px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(-20%);opacity:0}}
@keyframes spin360{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ═══ LAYOUT ═══ */
#app{height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.screen{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}

/* ═══ НАВ ═══ */
.nav{
  background:rgba(0,0,8,0.88);
  backdrop-filter:blur(50px) saturate(200%);-webkit-backdrop-filter:blur(50px) saturate(200%);
  border-top:0.5px solid rgba(255,255,255,0.1);
  padding:8px 0 calc(10px + var(--safe-b));
  display:flex;position:relative;z-index:100;
}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px;cursor:pointer;border:none;background:none;}
.nav-icon{font-size:22px;transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.nav-label{font-size:10px;font-weight:600;color:var(--txt3);transition:color .25s;letter-spacing:.2px;}
.nav-btn.active .nav-label{color:var(--accent);}
.nav-btn.active .nav-icon{transform:scale(1.25);}

/* ═══ ШАПКА ═══ */
.hdr{
  padding:14px 16px 12px;display:flex;align-items:center;gap:10px;
  background:rgba(0,0,8,0.75);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border-bottom:0.5px solid var(--border);position:sticky;top:0;z-index:50;
}
.hdr-title{font-size:24px;font-weight:700;flex:1;}

/* ═══ ФИЛЬТР-БАР ═══ */
.fbar{display:flex;gap:8px;padding:10px 14px 6px;overflow-x:auto;}
.fpill{
  display:flex;align-items:center;gap:5px;
  padding:8px 16px;border-radius:100px;
  font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
  background:linear-gradient(135deg,rgba(255,255,255,0.09),rgba(255,255,255,0.04));
  border:1px solid rgba(255,255,255,0.15);color:var(--txt2);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1),0 2px 8px rgba(0,0,0,0.3);
  transition:all .25s;flex-shrink:0;
}
.fpill.on{border-color:var(--accent);color:var(--accent);background:rgba(191,90,242,.15);box-shadow:0 0 12px rgba(191,90,242,.2);}

/* ═══ СЕТКА ═══ */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 12px 120px;}

/* ═══ КАРТОЧКА ═══ */
.card{
  background:linear-gradient(145deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.12);border-radius:22px;overflow:hidden;
  cursor:pointer;transition:transform .2s cubic-bezier(.34,1.2,.64,1),box-shadow .2s;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.15),0 4px 20px rgba(0,0,0,0.3);
}
.card:active{transform:scale(.94);}
.card-img{aspect-ratio:1;background:linear-gradient(145deg,var(--bg3),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:54px;position:relative;overflow:hidden;}
.card-img::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,255,255,0.06),transparent);}
.card-tags{position:absolute;top:7px;left:6px;display:flex;flex-wrap:wrap;gap:3px;max-width:95%;}
.tag{font-size:9px;font-weight:700;padding:3px 7px;border-radius:100px;letter-spacing:.2px;line-height:1.3;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.card-body{padding:9px 10px 11px;}
.card-name{font-size:12px;font-weight:600;color:var(--txt);margin-bottom:8px;line-height:1.35;}
.card-foot{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.card-price{font-size:14px;font-weight:700;}
.add-btn{
  background:linear-gradient(135deg,var(--accent),rgba(191,90,242,.7));color:#fff;border:none;
  border-radius:100px;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 3px 10px rgba(191,90,242,.4);
  transition:transform .15s;flex-shrink:0;
}
.add-btn:active{transform:scale(.88);}
.qty-pill{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),rgba(255,55,95,.8));border-radius:100px;padding:5px 10px;flex-shrink:0;box-shadow:0 3px 12px rgba(191,90,242,.4);}
.qty-btn{background:none;border:none;color:#fff;font-size:16px;cursor:pointer;font-weight:700;line-height:1;padding:0 2px;}
.qty-n{font-size:12px;font-weight:700;color:#fff;}

/* ═══ FAB ═══ */
.fab{
  position:fixed;bottom:calc(82px + var(--safe-b));right:16px;
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#ff375f);
  border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:24px;cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 8px 32px rgba(191,90,242,.55);
  display:flex;align-items:center;justify-content:center;z-index:200;transition:transform .2s;
}
.fab:active{transform:scale(.88);}
.fab-badge{position:absolute;top:-3px;right:-3px;background:#ff375f;color:#fff;border-radius:50%;min-width:20px;height:20px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);}

/* ═══ ОВЕРЛЕЙ / ШТОРКА ═══ */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;}
.overlay.fade-in{animation:fdIn .25s ease;}
.overlay.fade-out{animation:fdIn .35s ease reverse;}
.sheet{
  width:100%;max-height:90vh;overflow-y:auto;
  background:rgba(10,10,22,.96);backdrop-filter:blur(60px);-webkit-backdrop-filter:blur(60px);
  border-radius:28px 28px 0 0;border-top:0.5px solid rgba(255,255,255,0.15);
  border-left:0.5px solid rgba(255,255,255,0.08);border-right:0.5px solid rgba(255,255,255,0.08);
  padding:0 0 calc(24px + var(--safe-b));
  box-shadow:0 -20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,0.12);
}
.sheet.slide-up{animation:slideUp .4s cubic-bezier(.32,.72,0,1);}
.sheet.slide-down{animation:slideUp .5s cubic-bezier(.32,.72,0,1) reverse;}
.drag{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:12px auto 20px;}
.sheet-title{font-size:20px;font-weight:700;padding:0 18px 14px;}

/* ═══ ИНПУТЫ ═══ */
.inp{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);
  border-radius:16px;padding:14px 16px;font-size:16px;color:var(--txt);
  width:100%;outline:none;transition:border-color .25s,box-shadow .25s;
  -webkit-appearance:none;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.2);
}
.inp:focus{border-color:var(--accent);box-shadow:inset 0 1px 3px rgba(0,0,0,.2),0 0 0 3px rgba(191,90,242,.2);}
.inp::placeholder{color:var(--txt3);}
.inp.valid{border-color:var(--green);box-shadow:inset 0 1px 3px rgba(0,0,0,.2),0 0 0 3px rgba(48,209,88,.15);}
.inp-label{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:6px;letter-spacing:.3px;}

/* ═══ OTP ═══ */
.phone-row{display:flex;align-items:center;justify-content:center;gap:3px;flex-wrap:nowrap;}
.phone-prefix{font-size:17px;font-weight:800;color:var(--txt2);flex-shrink:0;margin-right:1px;}
.phone-sep{font-size:17px;font-weight:700;color:var(--txt3);flex-shrink:0;}
.otp-box{
  width:28px;height:38px;border-radius:9px;
  border:1.5px solid rgba(255,255,255,0.15);
  background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
  font-size:16px;font-weight:700;text-align:center;color:var(--txt);
  outline:none;transition:border-color .2s;-webkit-appearance:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1);
}
.otp-box:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(191,90,242,.2);}
.otp-box.ok{border-color:var(--green);color:var(--green);}

/* ═══ СПИСОК ═══ */
.list-sec{
  background:linear-gradient(135deg,rgba(255,255,255,0.07),rgba(255,255,255,0.03));
  border:1px solid rgba(255,255,255,0.1);border-radius:22px;margin:0 14px 12px;overflow:hidden;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.1),0 4px 20px rgba(0,0,0,.25);
}
.list-row{display:flex;align-items:center;gap:12px;padding:15px 16px;border-bottom:0.5px solid rgba(255,255,255,0.06);cursor:pointer;transition:background .15s;}
.list-row:last-child{border-bottom:none;}
.list-row:active{background:rgba(255,255,255,.05);}
.list-row.dis{opacity:.3;pointer-events:none;}
.list-ic{font-size:20px;width:24px;text-align:center;}
.list-lbl{flex:1;font-size:15px;font-weight:500;}
.list-arr{color:var(--txt3);font-size:18px;}

/* ═══ ТОГГЛ ═══ */
.tog{width:44px;height:26px;border-radius:13px;background:var(--bg3);position:relative;cursor:pointer;border:none;transition:background .22s;flex-shrink:0;box-shadow:inset 0 1px 3px rgba(0,0,0,.4);}
.tog.on{background:var(--green);}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#fff,#e0e0e0);transition:transform .22s;box-shadow:0 1px 4px rgba(0,0,0,.4);}
.tog.on::after{transform:translateX(18px);}

/* ═══ FAQ ═══ */
.faq-item{border-bottom:0.5px solid rgba(255,255,255,0.06);}
.faq-q{width:100%;text-align:left;padding:16px 18px;background:none;border:none;color:var(--txt);font-size:15px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.faq-arr{color:var(--txt3);transition:transform .35s cubic-bezier(.34,1.2,.64,1);display:inline-block;}
.faq-arr.open{transform:rotate(90deg);}
.faq-body{overflow:hidden;max-height:0;transition:max-height .4s cubic-bezier(.4,0,.2,1);}
.faq-body.open{max-height:200px;}
.faq-txt{padding:0 18px 16px;color:var(--txt2);font-size:14px;line-height:1.7;}

/* ═══ РУЛЕТКА ═══ */
.roul-outer{position:relative;overflow:hidden;border-radius:22px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid rgba(255,255,255,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 8px 32px rgba(0,0,0,.4);}
.roul-track{display:flex;will-change:transform;}
.roul-item{min-width:110px;height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;margin:6px 4px;border-radius:18px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);transition:all .25s;box-shadow:inset 0 1px 0 rgba(255,255,255,.1);}
.roul-item.win-item{border-color:var(--green)!important;background:rgba(48,209,88,.12)!important;box-shadow:0 0 20px rgba(48,209,88,.2)!important;}
.roul-ptr{position:absolute;top:4px;bottom:4px;left:50%;transform:translateX(-50%);width:118px;border:2px solid rgba(191,90,242,.85);border-radius:20px;pointer-events:none;box-shadow:0 0 30px rgba(191,90,242,.35),inset 0 0 20px rgba(191,90,242,.07);}

/* ═══ ДЕТАЛЬНАЯ ═══ */
.detail-page{position:fixed;inset:0;z-index:400;background:var(--bg);overflow-y:auto;animation:slideIn .3s cubic-bezier(.32,.72,0,1);}
.detail-img{aspect-ratio:1;background:linear-gradient(145deg,var(--bg3),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:90px;position:relative;}
.detail-img::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.05),transparent);}
.detail-back{position:fixed;top:calc(16px + env(safe-area-inset-top,0px));left:16px;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.65);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 4px 16px rgba(0,0,0,.5);z-index:410;}
.detail-foot{position:sticky;bottom:0;background:rgba(0,0,8,.9);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-top:0.5px solid var(--border);padding:14px 18px calc(14px + var(--safe-b));display:flex;align-items:center;gap:14px;}

/* ═══ ОНБОРДИНГ ═══ */
.onboard{position:fixed;inset:0;z-index:600;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px calc(32px + var(--safe-b));animation:fdIn .4s ease;overflow:hidden;}
.ob-emoji{font-size:58px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
.ob-title{font-size:26px;font-weight:800;text-align:center;line-height:1.25;margin-bottom:10px;}
.ob-sub{font-size:14px;color:var(--txt2);text-align:center;line-height:1.65;margin-bottom:24px;}

/* ═══ УВЕДОМЛЕНИЕ ═══ */
.notif-bar{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(20,20,35,.96);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:12px 20px;font-size:14px;font-weight:600;z-index:999;white-space:nowrap;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 8px 40px rgba(0,0,0,.6);animation:slideIn .3s cubic-bezier(.34,1.56,.64,1);}

/* ═══ ПОЛЗУНОК ═══ */
.range-wrap{position:relative;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:20px 0 8px;}
.range-fill{position:absolute;height:100%;background:linear-gradient(90deg,var(--accent),#ff375f);border-radius:2px;}
input[type=range]{position:absolute;top:50%;transform:translateY(-50%);width:100%;-webkit-appearance:none;background:transparent;pointer-events:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#fff,#e0e0e0);border:2px solid var(--bg);cursor:pointer;pointer-events:all;box-shadow:0 2px 8px rgba(0,0,0,.5);}

/* ═══ БАННЕР ЗАКАЗА ═══ */
.order-bar{background:rgba(10,10,22,.97);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-top:0.5px solid rgba(255,255,255,.1);padding:10px 14px calc(10px + var(--safe-b));display:flex;align-items:center;gap:10px;cursor:pointer;position:relative;z-index:90;box-shadow:0 -4px 20px rgba(0,0,0,.3);}

/* ═══ ЧЕКАУТ ═══ */
.co-page{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;animation:slideIn .3s cubic-bezier(.32,.72,0,1);}
.back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--accent);font-size:16px;font-weight:600;cursor:pointer;padding:0;}

/* ═══ ЧАТ ═══ */
.chat-page{position:fixed;inset:0;z-index:450;background:var(--bg);display:flex;flex-direction:column;animation:slideIn .3s cubic-bezier(.32,.72,0,1);}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;margin:3px 0;}
.msg-out{background:linear-gradient(135deg,var(--accent),rgba(191,90,242,.7));color:#fff;align-self:flex-end;border-bottom-right-radius:6px;box-shadow:0 2px 10px rgba(191,90,242,.3);}
.msg-in{background:rgba(255,255,255,.08);color:var(--txt);align-self:flex-start;border-bottom-left-radius:6px;}

/* ═══ СЛАЙДЕР ВКЛАДОК ═══ */
.tab-slider{position:relative;overflow:hidden;flex:1;display:flex;flex-direction:column;}
.tab-track{display:flex;flex:1;transition:transform .38s cubic-bezier(.4,0,.2,1);will-change:transform;}
.tab-slide{width:100%;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;}
/* ═══ ПЛАВАЮЩАЯ ТАБЛЕТКА ЗАКАЗА ═══ */

// ══ ЛОКАЛЬНОЕ ХРАНИЛИЩЕ ЗАКАЗОВ (localStorage) ══════════════════
// Ключ общий — admin и user используют один браузер/localStorage.
// Для cross-device: реквизиты передаются через TG deeplink.

const ORD_KEY = 'vn_ord';

function getLocalOrderState(id){
  try{
    const all=JSON.parse(localStorage.getItem(ORD_KEY)||'{}');
    return all[String(id)]||null;
  }catch(e){return null;}
}

function setLocalOrderState(id, data){
  try{
    const all=JSON.parse(localStorage.getItem(ORD_KEY)||'{}');
    all[String(id)]={...(all[String(id)]||{}), ...data, _ts:Date.now()};
    localStorage.setItem(ORD_KEY, JSON.stringify(all));
  }catch(e){}
}

// ══ STATE через Vercel KV + localStorage cache ═══════════════════
async function setOrderState(id, data){
  // 1. Сразу пишем в localStorage (мгновенно)
  setLocalOrderState(id, data);
  // 2. Пишем в KV через API (работает между устройствами)
  try{
    await fetch('/api/order-state',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'set_order', orderId:String(id), data})
    });
  }catch(e){}
  // 3. Если оплачено — уведомляем админа
  if(data && data.payState==='paid'){
    try{
      await fetch('/api/poll',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'paid', orderId:String(id)})});
    }catch(e){}
  }
}

async function getOrderState(id){
  // 1. Сначала смотрим localStorage (мгновенно)
  const local = getLocalOrderState(id);
  // Если в localStorage уже есть актуальный ответ — возвращаем сразу
  if(local && local.payState && local.payState !== 'waiting_requisites') return local;
  // 2. Запрашиваем KV (работает между устройствами)
  try{
    const r=await fetch('/api/order-state',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_order', orderId:String(id)})
    });
    const d=await r.json();
    if(d.state && d.state.payState && d.state.payState!=='waiting_requisites'){
      // Обновляем localStorage из KV
      setLocalOrderState(id, d.state);
      return d.state;
    }
  }catch(e){}
  return local || {payState:'waiting_requisites'};
}

// Сохраняем/загружаем checkout для восстановления при вылете
const CO_KEY='vn_co';
function saveCheckout(co){
  if(!co||!co.orderId)return;
  try{
    // Сохраняем только сериализуемые поля (без таймеров)
    const safe={
      step:co.step, orderId:co.orderId, total:co.total, disc:co.disc||0,
      receiver:co.receiver, otherName:co.otherName||'', otherPhone:co.otherPhone||'',
      addrIdx:co.addrIdx||0, payStatus:co.payStatus,
      payBankId:co.payBank?.id||null, payBankName:co.payBank?.name||null,
      payPhone:co.payPhone||null, payName:co.payName||null,
      _deadline:co._deadline||null,
    };
    localStorage.setItem(CO_KEY, JSON.stringify(safe));
  }catch(e){}
}
function clearCheckout(){
  try{localStorage.removeItem(CO_KEY);}catch(e){}
}
function loadCheckout(){
  try{
    const s=localStorage.getItem(CO_KEY);
    if(!s)return null;
    const d=JSON.parse(s);
    if(!d||!d.orderId)return null;
    // Восстанавливаем объект bank из id/name
    if(d.payBankId||d.payBankName){
      d.payBank=BANKS.find(b=>b.id===d.payBankId)||BANKS.find(b=>b.name===d.payBankName)||null;
    }
    return d;
  }catch(e){return null;}
}


// УТИЛИТЫ

function el(tag,props,kids){
  const e=document.createElement(tag);
  if(props)for(const[k,v]of Object.entries(props)){
    if(k==='cls')e.className=v;
    else if(k==='css')e.style.cssText=v;
    else if(k[0]==='o'&&k[1]==='n')e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  if(kids)for(const k of kids){
    if(k==null)continue;
    e.appendChild(typeof k==='string'?document.createTextNode(k):k);
  }
  return e;
}
function txt(s){return document.createTextNode(String(s));}

function render(){

function buildRoot(){

  else scr.appendChild(buildProfile());
  if(S.tab<2){
    const cnt=cartCount();
    const fab=el('button',{cls:'fab',onClick:()=>{S.cartOpen=true;render();}},['🪣']);
    if(cnt>0)fab.appendChild(el('div',{cls:'fab-badge'},[txt(cnt)]));
    scr.appendChild(fab);
    // Таблетка активного заказа
    const ao=activeOrders()[0];
    if(ao){
      const ordState=getLocalOrderState(ao.id)||{};
      const isPayStep=ao.payState==='waiting_requisites'||ao.payState==='paid';
      const isOnPayPage=ordState.payState==='requisites_sent'&&!ao.payState==='confirmed';
      const savedCo=loadCheckout();
      const isIncomplete=savedCo&&savedCo.orderId===ao.id&&savedCo.step>0&&savedCo.step<7;

      // Мигающая красная таблетка если заказ на этапе оплаты
      if(isIncomplete&&(savedCo.step===5||savedCo.step===4)){
        const fab2=el('div',{cls:'order-fab',
          id:'order_fab_timer',
          css:'color:#ff375f;border-color:rgba(255,55,95,.7);animation:pulse 1.5s ease-in-out infinite;',
          onClick:()=>showResumeOrderDialog(ao,savedCo)});
        fab2.appendChild(el('span',{css:'font-weight:800;'},['💳 Оплата №'+ao.id]));
        // Таймер если на шаге 5
        if(savedCo.step===5&&savedCo._deadline){
          const timerEl=el('span',{id:'fabTimer',css:'background:rgba(255,55,95,.2);color:#ff375f;border-radius:100px;padding:2px 8px;font-size:10px;font-weight:700;'},['...']);
          fab2.appendChild(timerEl);
          function updateFabTimer(){
            const el2=document.getElementById('fabTimer');
            if(!el2)return;
            const s=Math.max(0,Math.ceil((savedCo._deadline-Date.now())/1000));
            const m=Math.floor(s/60),sec=s%60;
            el2.textContent=m+':'+(sec<10?'0':'')+sec;
            if(s>0)setTimeout(updateFabTimer,1000);
          }
          setTimeout(updateFabTimer,0);
        }
        scr.appendChild(fab2);
      }else{
        const c=ORDER_COLORS[ao.status]||ORDER_COLORS['Заказ создан'];
        const fab2=el('div',{cls:'order-fab',css:'color:'+c[0]+';border-color:'+c[0]+'66;',
          onClick:()=>{
            if(isIncomplete){showResumeOrderDialog(ao,savedCo);}
            else{S.profSec='orders';S.tab=2;render();}
          }});
        fab2.appendChild(el('span',{},['Заказ №'+ao.id]));
        fab2.appendChild(el('span',{css:'background:'+c[1]+';color:'+c[0]+';border-radius:100px;padding:2px 8px;font-size:10px;'},[clientStatus(ao.status)]));
        scr.appendChild(fab2);
      }
    }
  }
  if(S.cartOpen)scr.appendChild(buildCart());
  if(S.filterOpen)scr.appendChild(buildFilter());

function buildGifts(){
  const wrap=el('div',{css:'display:flex;flex-direction:column;height:100%;overflow:hidden;'});
  const hdr=el('div',{cls:'hdr'});
  hdr.appendChild(el('div',{cls:'hdr-title'},['🎁 Подарки']));
  if(!S.user){
    const pill=el('div',{css:'background:rgba(191,90,242,.15);border:1px solid rgba(191,90,242,.35);border-radius:100px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--accent);cursor:pointer;white-space:nowrap;',
      onClick:()=>{S.onboard=true;S.obStep=0;render();}},['🎁 Дарим 1000 баллов']);
    hdr.appendChild(pill);
  }
  wrap.appendChild(hdr);
  const scr=el('div',{cls:'scroll'});
  scr.appendChild(buildFSBar());
  let items=[...GIFTS];
  const f=S.gf;
  if(f.type)items=items.filter(i=>i.type===f.type);
  if(f.vegan)items=items.filter(i=>i.vegan);
  if(f.halal)items=items.filter(i=>i.halal);
  if(f.noNuts)items=items.filter(i=>i.noNuts);
  if(f.minP>0||f.maxP<5000)items=items.filter(i=>i.price>=f.minP&&i.price<=f.maxP);
  items=sortItems(items);

function sortItems(items){
  if(S.sortBy==='cheap')return items.sort((a,b)=>a.price-b.price);
  if(S.sortBy==='exp')return items.sort((a,b)=>b.price-a.price);
  return items.sort((a,b)=>b.sold-a.sold);
}
function buildFSBar(){
  const row=el('div',{cls:'fbar'});

  const sp=el('div',{cls:'fpill'+(S.sortBy!=='popular'?' on':''),onClick:()=>{S.sortOpen=!S.sortOpen;S.filterOpen=false;render();}});
  sp.textContent='↕ Сортировка';
  const fp=el('div',{cls:'fpill'+(hasF?' on':''),onClick:()=>{S.filterOpen=!S.filterOpen;S.sortOpen=false;render();}});
  fp.textContent='⚙ Фильтры'+(hasF?' ●':'');
  row.appendChild(sp);row.appendChild(fp);
  return row;
}
function hasFilters(){
  if(S.tab===0){const f=S.ff;return !!(f.types.length||f.minP>0||f.maxP<8000||f.minH>50||f.maxH<100);}
  const f=S.gf;return !!(f.type||f.vegan||f.halal||f.noNuts||f.minP>0||f.maxP<5000);
}

function buildCard(p,sec){

  const img=el('div',{cls:'card-img'});

  else img.appendChild(el('span',{css:'position:relative;z-index:1;font-size:52px;'},[p.e]));

  (p.tags||[]).slice(0,3).forEach(t=>{

    tags.appendChild(el('div',{cls:'tag',css:'color:'+c[0]+';background:'+c[1]+';border:1px solid '+c[0]+'55;'},[t]));

}

function buildRangeSec(title,min,max,vMin,vMax,onChange){
  const sec=el('div',{css:'padding:0 16px 16px;'});
  const lbl=el('div',{cls:'inp-label',css:'display:block;'});
  lbl.id='rlbl_'+title.replace(/[^a-zа-я]/gi,'');
  lbl.textContent=title+': '+vMin.toLocaleString('ru')+' – '+vMax.toLocaleString('ru');
  sec.appendChild(lbl);
  const wrap=el('div',{css:'position:relative;margin-top:18px;padding:0 2px;'});
  const track=el('div',{cls:'range-wrap'});
  const fill=el('div',{cls:'range-fill'});
  const pMin=((vMin-min)/(max-min))*100;
  const pMax=((vMax-min)/(max-min))*100;
  fill.style.left=pMin+'%';fill.style.right=(100-pMax)+'%';
  track.appendChild(fill);
  const r1=el('input',{type:'range',min,max,value:vMin});
  const r2=el('input',{type:'range',min,max,value:vMax});
  // ИСПРАВЛЕН: оба ползунка работают
  r1.style.zIndex=+r1.value>=+r2.value-10?'5':'4';
  r2.style.zIndex='4';
  r1.oninput=()=>{
    if(+r1.value>+r2.value)r1.value=r2.value;
    const p1=((+r1.value-min)/(max-min))*100;
    const p2=((+r2.value-min)/(max-min))*100;
    fill.style.left=p1+'%';fill.style.right=(100-p2)+'%';
    lbl.textContent=title+': '+(+r1.value).toLocaleString('ru')+' – '+(+r2.value).toLocaleString('ru');
    onChange(+r1.value,+r2.value);
  };
  r2.oninput=()=>{
    if(+r2.value<+r1.value)r2.value=r1.value;
    const p1=((+r1.value-min)/(max-min))*100;
    const p2=((+r2.value-min)/(max-min))*100;
    fill.style.left=p1+'%';fill.style.right=(100-p2)+'%';
    lbl.textContent=title+': '+(+r1.value).toLocaleString('ru')+' – '+(+r2.value).toLocaleString('ru');
    onChange(+r1.value,+r2.value);
  };
  track.appendChild(r1);track.appendChild(r2);
  wrap.appendChild(track);sec.appendChild(wrap);
  return sec;
}

    });
    const sum=el('div',{css:'padding:16px 18px;'});
    const total=cartTotal();
    // Лепестки: 75% ровно
    if(S.user&&(S.user.petals||0)>0){
      const maxDisc=Math.floor(total*0.75);
      const availPetals=S.user.petals||0;
      const actualDisc=Math.min(availPetals,maxDisc);
      const pr=el('div',{css:'display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid rgba(255,255,255,.06);margin-bottom:8px;'});

      pr.appendChild(tog);sum.appendChild(pr);
    }
    const disc=S.usePetals&&S.user?Math.min(S.user.petals||0,Math.floor(total*0.75)):0;
    [['Сумма',total.toLocaleString('ru')+' ₽',false],
     disc?['Скидка ☘️','-'+disc.toLocaleString('ru')+' ₽',true]:null,
     ['Доставка','Бесплатно',false]].filter(Boolean).forEach(([k,v,gr])=>{
      const rw=el('div',{css:'display:flex;justify-content:space-between;padding:6px 0;'});

      sum.appendChild(rw);
    });
    sum.appendChild(el('div',{css:'height:0.5px;background:rgba(255,255,255,.08);margin:10px 0;'}));
    const tr=el('div',{css:'display:flex;justify-content:space-between;margin-bottom:16px;'});

function buildCheckout(){
  const co=S.checkout;
  const page=el('div',{cls:'co-page'});
  if(co.step===1)buildCO1(page);
  else if(co.step===2)buildCO2(page);
  else if(co.step===3)buildCO3(page);
  else if(co.step===4)buildCO4(page);
  else if(co.step===5)buildCO5(page);
  else if(co.step===6)buildCO6(page);
  else buildCO7(page);
  return page;
}

function buildCO4(page){
  const co=S.checkout;
  if(!co.orderId){
    const addrs=(S.user&&S.user.addresses)||[];
    const addr=co._tempAddr||addrs[co.addrIdx]||{};
    const order={
      id:Math.floor(Math.random()*90000+10000),
      date:new Date().toLocaleDateString('ru'),
      items:{...S.cart},total:co.total,status:'Заказ создан',
      address:addr.street||S.user.addr||'—',
      receiver:co.receiver==='other'?{name:co.otherName,phone:co.otherPhone}:'me',
      disc:co.disc,
      userName:S.user.name||'—',userPhone:S.user.phone||'—',
      userTgId:getTgId(),
      payState:'waiting_requisites',
      ts:Date.now()
    };
    S.orders.unshift(order);
    if(co.disc>0&&S.usePetals)S.user.petals=Math.max(0,(S.user.petals||0)-co.disc);
    co.orderId=order.id;
    addLog('Создан заказ №'+order.id,'Сумма: '+order.total+' ₽');
    // СИНХРОННО сохраняем в localStorage
    setLocalOrderState(order.id, order);
    save();
    // Сохраняем checkout для восстановления
    saveCheckout(co);
    // Уведомление в TG бот (fire-and-forget)
    notifyAdmin({action:'new_order',orderData:{
      id:order.id,total:order.total,
      userName:order.userName,userPhone:order.userPhone,
      items:order.items,address:order.address
    }});
  }
  const scr=el('div',{css:'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;'});
  scr.appendChild(el('div',{css:'font-size:22px;font-weight:800;margin-bottom:30px;'},['Готовим реквизиты']));
  scr.appendChild(el('div',{cls:'spinner',css:'margin:0 auto 30px;'}));
  const msgDiv=el('div',{id:'co4msg',css:'font-size:13px;color:var(--txt3);min-height:20px;transition:opacity .5s;'});
  msgDiv.textContent=CO_MSGS[co.msgIdx||0];scr.appendChild(msgDiv);
  page.appendChild(scr);
  // Сразу проверяем state — вдруг реквизиты уже пришли пока не было WebApp
  const existingState=getLocalOrderState(co.orderId);
  if(existingState){
    if(existingState.payState==='requisites_sent'&&co.step===4){
      co.payBank=BANKS.find(b=>b.id===existingState.payBankId)||BANKS.find(b=>b.name===existingState.payBank)||BANKS[0];
      co.payPhone=existingState.payPhone||'—';
      co.payName=existingState.payName||'—';
      co.step=5;saveCheckout(co);
      // Убиваем старые таймеры если были
      if(co._pollTimer){clearInterval(co._pollTimer);co._pollTimer=null;}
      if(co._msgTimer){clearInterval(co._msgTimer);co._msgTimer=null;}
      render();return;
    }
    if(existingState.payState==='cancelled'&&co.step===4){
      co.payStatus='fail';co.step=7;
      if(co._pollTimer){clearInterval(co._pollTimer);co._pollTimer=null;}
      if(co._msgTimer){clearInterval(co._msgTimer);co._msgTimer=null;}
      render();return;
    }
  }

  if(!co._msgTimer){
    co._msgTimer=setInterval(()=>{
      co.msgIdx=((co.msgIdx||0)+1)%CO_MSGS.length;
      const md=document.getElementById('co4msg');
      if(md){md.style.opacity='0';setTimeout(()=>{if(md){md.textContent=CO_MSGS[co.msgIdx];md.style.opacity='1';}},400);}
    },2000);
    // Гибридный polling: сначала localStorage (мгновенно), потом KV (между устройствами)
    co._pollTimer=setInterval(async()=>{
      if(!S.checkout||S.checkout.orderId!==co.orderId){
        clearInterval(co._pollTimer);co._pollTimer=null;return;
      }
      const ord=await getOrderState(co.orderId);
      if(!ord)return;
      if(ord.payState==='cancelled'){
        clearInterval(co._pollTimer);clearInterval(co._msgTimer);co._pollTimer=null;co._msgTimer=null;
        co.payStatus='fail';co.step=7;render();return;
      }
      if(ord.payState==='requisites_sent'){
        clearInterval(co._pollTimer);clearInterval(co._msgTimer);co._pollTimer=null;co._msgTimer=null;
        co.payBank=BANKS.find(b=>b.id===ord.payBankId)||BANKS.find(b=>b.name===ord.payBank)||BANKS[0];
        co.payPhone=ord.payPhone||'—';
        co.payName=ord.payName||'—';
        co.step=5;saveCheckout(co);render();
      }
    },2000);
  }
}

    scr.appendChild(el('div',{css:'font-size:24px;font-weight:800;margin-bottom:8px;'},['Что‑то пошло не так']));

    // Выделенная кнопка поддержки
    const sb=el('button',{
      css:'width:100%;padding:17px;border-radius:20px;border:1.5px solid rgba(191,90,242,.5);background:rgba(191,90,242,.12);color:var(--accent);font-size:17px;font-weight:700;cursor:pointer;margin-bottom:10px;box-shadow:0 4px 20px rgba(191,90,242,.2);',
      onClick:()=>{S.chatOpen=true;S.checkout=null;S.tab=2;render();}});
    sb.textContent='🆘 Связаться с поддержкой';
    // Кнопка назад
    const rb=el('button',{
      css:'width:100%;padding:15px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--txt2);font-size:15px;font-weight:600;cursor:pointer;',
      onClick:()=>{S.checkout=null;render();}});
    rb.textContent='← На главную';
    scr.appendChild(sb);scr.appendChild(rb);
  }
  page.appendChild(scr);
}

    sec.appendChild(ri);
    ['📦 Мои заказы','☘️ Баллы','🔗 Рефералка'].forEach(lb=>{const r=el('div',{cls:'list-row dis'});r.appendChild(el('span',{},[lb]));sec.appendChild(r);});

  ab.textContent='⚙️ Администратор';scr.appendChild(ab);
  wrap.appendChild(scr);return wrap;
}

// ПОДРАЗДЕЛЫ ПРОФИЛЯ
// ══════════════════════════════════════════
function buildProfSec(){
  const page=el('div',{css:'position:fixed;inset:0;z-index:400;background:var(--bg);overflow-y:auto;animation:slideIn .3s cubic-bezier(.32,.72,0,1);'});

  hdr.appendChild(el('div',{css:'width:70px;'}));
  page.appendChild(hdr);
  const scr=el('div',{css:'padding:18px 16px 60px;'});
  const k=S.profSec;

  if(k==='data'){
    scr.appendChild(el('div',{css:'font-size:24px;font-weight:800;margin-bottom:18px;'},['👤 Мои данные']));

    const phoneI=el('input',{cls:'inp',placeholder:'Телефон'});phoneI.value=S.user.phone||'';
    scr.appendChild(el('div',{cls:'inp-label',css:'display:block;'},['Имя']));scr.appendChild(nameI);
    scr.appendChild(el('div',{cls:'inp-label',css:'display:block;margin-top:12px;'},['Телефон']));scr.appendChild(phoneI);
    scr.appendChild(el('div',{css:'font-size:17px;font-weight:700;margin-top:22px;margin-bottom:10px;'},['📍 Адреса доставки']));
    if(!S.user.addresses)S.user.addresses=[{street:S.user.addr||'',intercom:S.user.intercom||'',entr:S.user.entr||'',floor:S.user.floor||'',apt:S.user.apt||'',note:'',expanded:false}];
    const addrWrap=el('div',{id:'addrWrap'});
    scr.appendChild(addrWrap);
    function renderAddresses(){
      const aw=document.getElementById('addrWrap');if(!aw)return;aw.innerHTML='';
      S.user.addresses.forEach((addr,ai)=>{
        const label=addr.street||'Адрес '+(ai+1);
        const card=el('div',{cls:'addr-card',css:'margin-bottom:8px;'});
        const head=el('div',{cls:'addr-head',onClick:()=>{addr.expanded=!addr.expanded;renderAddresses();}});
        head.appendChild(el('div',{css:'flex:1;font-size:14px;font-weight:600;'},[label]));
        head.appendChild(el('div',{css:'color:var(--txt3);font-size:18px;transition:transform .3s;transform:rotate('+(addr.expanded?'90':'0')+'deg);'},[txt('›')]));
        card.appendChild(head);
        if(addr.expanded){
          const body=el('div',{css:'padding:0 14px 14px;display:flex;flex-direction:column;gap:6px;'});
          [['street','Улица, дом'],['intercom','Домофон'],['entr','Подъезд'],['floor','Этаж'],['apt','Квартира'],['note','Комментарий для курьера']].forEach(([fk,fp])=>{
            body.appendChild(el('div',{cls:'inp-label',css:'display:block;margin-top:4px;'},[fp]));
            const fi=el('input',{cls:'inp',placeholder:fp});
            fi.value=addr[fk]||'';
            // ИСПРАВЛЕН БАГ: oninput вместо input listener через addEventListener
            fi.oninput=function(){addr[fk]=this.value;};
            if(fk==='street')fi.onblur=function(){const aw2=document.getElementById('addrWrap');if(aw2){const lbl=aw2.querySelector('.addr-head div');if(lbl)lbl.textContent=this.value||'Адрес '+(ai+1);}};
            body.appendChild(fi);
          });
          const delB=el('button',{css:'margin-top:8px;background:rgba(255,55,95,.1);border:1px solid rgba(255,55,95,.3);border-radius:12px;padding:10px;color:#ff375f;font-size:13px;font-weight:600;cursor:pointer;width:100%;',onClick:()=>{S.user.addresses.splice(ai,1);renderAddresses();}});
          delB.textContent='🗑 Удалить адрес';body.appendChild(delB);
          card.appendChild(body);
        }
        aw.appendChild(card);
      });
    }
    setTimeout(renderAddresses,0);
    const addB=el('button',{css:'width:100%;padding:14px;background:rgba(191,90,242,.08);border:1.5px dashed rgba(191,90,242,.35);border-radius:18px;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;',
      onClick:()=>{S.user.addresses.push({street:'',intercom:'',entr:'',floor:'',apt:'',note:'',expanded:true});renderAddresses();}});
    addB.textContent='+ Добавить адрес';scr.appendChild(addB);
    const sv=el('button',{cls:'btn-prim',css:'margin-top:22px;',onClick:()=>{S.user.name=nameI.value||S.user.name;S.user.phone=phoneI.value||S.user.phone;if(S.user.addresses[0])S.user.addr=S.user.addresses[0].street;save();showNotif('Данные сохранены ✅');}});
    sv.textContent='Сохранить';scr.appendChild(sv);
  }

  else if(k==='orders'){
    scr.appendChild(el('div',{css:'font-size:24px;font-weight:800;margin-bottom:16px;'},['📦 Мои заказы']));
    const now=Date.now();const sixMo=6*30*24*3600*1000;
    const visible=S.orders.filter(o=>{
      const ts=o.ts||Date.now();return(now-ts)<sixMo;
    });
    if(!visible.length)scr.appendChild(el('div',{css:'text-align:center;padding:40px;color:var(--txt3);'},['Пока нет заказов']));
    else visible.forEach(o=>{
      const st=clientStatus(o.status);
      const c=ORDER_COLORS[o.status]||ORDER_COLORS[st]||['var(--txt3)','var(--glass)'];
      const savedCo=loadCheckout();
      const isIncomplete=savedCo&&savedCo.orderId===o.id&&savedCo.step>0&&savedCo.step<7;
      const card=el('div',{css:'background:rgba(255,255,255,.05);border:1px solid '+(isIncomplete?'rgba(255,214,10,.5)':'rgba(255,255,255,.08)')+';border-radius:20px;padding:16px;margin-bottom:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08);cursor:pointer;',
        onClick:()=>{S._orderDetail=o;S.profSec='orderDetail';render();}});
      const top=el('div',{css:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;'});
      top.appendChild(el('div',{css:'font-size:15px;font-weight:700;'},['Заказ №'+o.id]));
      top.appendChild(el('div',{css:'background:'+c[1]+';color:'+c[0]+';border-radius:100px;padding:3px 12px;font-size:11px;font-weight:700;'},[st]));
      card.appendChild(top);
      card.appendChild(el('div',{css:'font-size:13px;color:var(--txt2);margin-bottom:4px;'},[o.date+' · '+o.address]));
      card.appendChild(el('div',{css:'font-size:18px;font-weight:800;color:var(--accent);margin-bottom:'+(isIncomplete?'8':'0')+'px;'},[o.total.toLocaleString('ru')+' ₽']));
      // Кнопка восстановления
      if(isIncomplete){
        const row=el('div',{css:'display:flex;gap:8px;margin-top:10px;'});
        const contB=el('button',{
          css:'flex:1;padding:10px;border-radius:14px;background:rgba(255,214,10,.15);border:1px solid rgba(255,214,10,.4);color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;',
          onClick:(e)=>{e.stopPropagation();showResumeOrderDialog(o,savedCo);}});
        contB.textContent='▶ Продолжить оформление';
        const cancelB=el('button',{
          css:'padding:10px 14px;border-radius:14px;background:rgba(255,55,95,.1);border:1px solid rgba(255,55,95,.3);color:var(--pink);font-size:13px;font-weight:700;cursor:pointer;',
          onClick:(e)=>{
            e.stopPropagation();
            o.status='Отменён';o.payState='cancelled';

            clearCheckout();addLog('Заказ №'+o.id+' отменён клиентом','');
            save();showNotif('Заказ отменён','❌');render();
          }});
        cancelB.textContent='✕';
        row.appendChild(contB);row.appendChild(cancelB);
        card.appendChild(row);
      }
      scr.appendChild(card);
    });
  }

  else if(k==='orderDetail'){
    const o=S._orderDetail;if(!o){S.profSec='orders';render();return;}

    rows.forEach(([k2,v])=>{const r=el('div',{css:'display:flex;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid rgba(255,255,255,.06);'});r.appendChild(el('span',{css:'font-size:13px;color:var(--txt2);'},[k2]));r.appendChild(el('span',{css:'font-size:13px;font-weight:600;text-align:right;max-width:55%;'},[v]));scr.appendChild(r);});

function buildChatDialog(page){
  const chat=S.activeChat;
  // Правка 12: обнуляем непрочитанные при открытии чата
  const unreadInThisChat=chat.msgs.filter(m=>m.from==='admin'&&m.unread).length;
  if(unreadInThisChat>0){
    chat.msgs.forEach(m=>{if(m.from==='admin')m.unread=false;});
    S.unreadChats=Math.max(0,(S.unreadChats||0)-unreadInThisChat);
    save();
  }
  const hdr=el('div',{cls:'hdr'});
  // Правка 4: большая кнопка назад в чате
  const chatBackBtn=el('button',{
    css:'display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--accent);font-size:17px;font-weight:700;cursor:pointer;padding:4px 8px;min-width:60px;',
    onClick:()=>{S.activeChat=null;render();}});
  chatBackBtn.textContent='‹ Назад';
  hdr.appendChild(chatBackBtn);
  // Правка 5: тема по центру — используем position:absolute для истинного центра
  const info=el('div',{css:'position:absolute;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;'});
  info.appendChild(el('div',{css:'font-size:15px;font-weight:700;white-space:nowrap;'},[chat.topic]));
  info.appendChild(el('div',{css:'font-size:11px;font-weight:700;color:'+(chat.status==='Активный'?'var(--green)':'var(--txt3)')+';'},[chat.status]));
  hdr.appendChild(info);
  hdr.appendChild(el('div',{css:'min-width:60px;'})); // балансирующий элемент
  hdr.style.position='relative';
  page.appendChild(hdr);
  const msgArea=el('div',{id:'msgArea',css:'flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px;'});
  if(!chat.msgs.length){msgArea.appendChild(el('div',{css:'text-align:center;padding:40px;color:var(--txt3);font-size:14px;'},['Напишите первое сообщение']));}
  chat.msgs.forEach(m=>{
    const bub=el('div',{cls:'msg-bubble '+(m.from==='user'?'msg-out':'msg-in')});
    if(m.type==='img'){const img=el('img',{src:m.url,css:'max-width:200px;border-radius:12px;display:block;'});bub.appendChild(img);}
    else bub.appendChild(txt(m.text||''));
    const tm=el('div',{css:'font-size:10px;opacity:.5;margin-top:4px;text-align:'+(m.from==='user'?'right':'left')+';'},[m.time||'']);
    bub.appendChild(tm);msgArea.appendChild(bub);
  });
  page.appendChild(msgArea);
  if(chat.status==='Активный'){
    const bar=el('div',{css:'padding:10px 14px calc(10px + var(--safe-b));background:rgba(0,0,8,.9);backdrop-filter:blur(40px);border-top:0.5px solid rgba(255,255,255,.08);display:flex;gap:8px;align-items:center;'});
    const inp=el('input',{cls:'inp',css:'flex:1;padding:12px 16px;',placeholder:'Сообщение...'});
    const sendB=el('button',{css:'width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#ff375f);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(191,90,242,.4);',
      onClick:()=>{
        if(!inp.value.trim())return;
        const msgText=inp.value;
        const isFirstMsg=chat.msgs.length===0;
        chat.msgs.push({from:'user',text:msgText,time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})});
        inp.value='';save();
        // Уведомление администратору о новом сообщении
        apiCall({action:'chat_msg',chatId:chat.id});
        // Правка 2: авто-ответ ТОЛЬКО на первое сообщение
        if(isFirstMsg){
          setTimeout(()=>{
            const userName=S.user?S.user.name:'Пользователь';
            const autoText='Здравствуйте, '+userName+'!\n\nНаши операторы уже работают по вашему обращению.\n\nОтветим в течении нескольких минут! ❤️';
            chat.msgs.push({from:'admin',text:autoText,time:new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})});
            save();
            const ma=document.getElementById('msgArea');if(ma){
              const bub=el('div',{cls:'msg-bubble msg-in'});
              bub.style.whiteSpace='pre-line';
              bub.appendChild(txt(autoText));
              ma.appendChild(bub);ma.scrollTop=ma.scrollHeight;
            }
          },1500);
        }
        const ma=document.getElementById('msgArea');if(ma){
          const bub=el('div',{cls:'msg-bubble msg-out'});bub.appendChild(txt(msgText));ma.appendChild(bub);ma.scrollTop=ma.scrollHeight;
        }
      }},['↑']);
    bar.appendChild(inp);bar.appendChild(sendB);page.appendChild(bar);
  }else{
    page.appendChild(el('div',{css:'padding:14px;text-align:center;font-size:13px;color:var(--txt3);background:rgba(0,0,8,.9);'},['Чат закрыт']));
  }
  setTimeout(()=>{const ma=document.getElementById('msgArea');if(ma)ma.scrollTop=ma.scrollHeight;},50);
}

function obPhone(){
  const d=obWrap([]);
  d.appendChild(el('div',{cls:'ob-title',css:'font-size:22px;margin-bottom:8px;'},['Введите номер телефона']));
  d.appendChild(el('div',{cls:'ob-sub',css:'font-size:13px;margin-bottom:20px;'},['Вводи актуальный номер — он нужен нам\nдля связи по вопросам заказа']));
  const GROUPS=[3,3,2,2];const boxes=[];
  const cont=el('button',{cls:'btn-glass',css:'width:100%;margin-top:22px;display:none;',
    onClick:()=>{S.obPhone='+7'+boxes.map(b=>b.value).join('');S.obStep=3;render();}});
  cont.textContent='Продолжить →';
  const phoneRow=el('div',{cls:'phone-row'});
  phoneRow.appendChild(el('span',{cls:'phone-prefix'},'+7'));
  phoneRow.appendChild(el('span',{cls:'phone-sep'},'('));
  GROUPS.forEach((len,gi)=>{
    for(let j=0;j<len;j++){
      const idx=boxes.length;
      const box=el('input',{cls:'otp-box',type:'tel',maxlength:'1',inputmode:'numeric',placeholder:'•'});
      boxes.push(box);phoneRow.appendChild(box);
      box.addEventListener('input',()=>{
        if(box.value&&!/\d/.test(box.value)){box.value='';return;}
        if(box.value)box.classList.add('ok');else box.classList.remove('ok');
        if(box.value&&idx<9)boxes[idx+1].focus();
        cont.style.display=boxes.filter(b=>b.value).length===10?'block':'none';
      });
      box.addEventListener('keydown',(e)=>{if(e.key==='Backspace'&&!box.value&&idx>0)boxes[idx-1].focus();});
    }
    if(gi===0)phoneRow.appendChild(el('span',{cls:'phone-sep'},')'));
    else if(gi<3)phoneRow.appendChild(el('span',{cls:'phone-sep'},'-'));
  });
  d.appendChild(phoneRow);d.appendChild(cont);
  return d;
}

    pr.innerHTML='<div style="font-size:44px;margin-bottom:8px;">🎉</div><div style="font-size:14px;color:var(--txt2);margin-bottom:6px;font-weight:600;">Твоя скидка:</div><div style="font-size:48px;font-weight:900;color:var(--green);">'+S.spinResult.l+'</div><div style="font-size:13px;color:var(--txt2);margin-top:6px;">☘️ +'+S.spinResult.v+' лепестков начислено</div>';
    d.appendChild(pr);
    const b=el('button',{cls:'btn-glass',css:'width:100%;',onClick:()=>{S.obStep=6;render();}});b.textContent='Круто, спасибо! 🎊';d.appendChild(b);return d;
  }
  const repeated=[...ROUL_ITEMS,...ROUL_ITEMS,...ROUL_ITEMS,...ROUL_ITEMS];
  const outer=el('div',{cls:'roul-outer',css:'width:100%;'});
  const track=el('div',{cls:'roul-track'});
  repeated.forEach(item=>{
    const ri=el('div',{cls:'roul-item'});
    ri.appendChild(el('div',{css:'font-size:18px;margin-bottom:4px;'},[item.win?'🎁':'💎']));
    ri.appendChild(el('div',{css:'font-size:13px;font-weight:800;color:'+(item.win?'var(--green)':'var(--txt3)')+';'},[item.l]));
    track.appendChild(ri);
  });
  outer.appendChild(track);outer.appendChild(el('div',{cls:'roul-ptr'}));d.appendChild(outer);
  const spinBtn=el('button',{cls:'btn-prim',css:'width:100%;margin-top:18px;',onClick:()=>{
    spinBtn.disabled=true;spinBtn.style.opacity='.5';
    const winners=ROUL_ITEMS.filter(r=>r.win);
    const result=winners[Math.floor(Math.random()*winners.length)];
    let targetIdx=Math.floor(repeated.length*0.6);
    const iW=118;
    for(let i=targetIdx;i<repeated.length;i++){if(repeated[i].v===result.v&&repeated[i].win){targetIdx=i;break;}}
    const cW=outer.clientWidth||320;
    const offset=-(targetIdx*iW-(cW/2-iW/2));
    const start=performance.now();const dur=3200;
    function animate(now){
      const t=Math.min((now-start)/dur,1);const ease=t<1?1-Math.pow(1-t,4):1;
      track.style.transform='translateX('+offset*ease+'px)';
      if(t<1)requestAnimationFrame(animate);
      else{S.spinResult=result;S.spun=true;render();}
    }
    requestAnimationFrame(animate);
  }});
  spinBtn.textContent='🎰 Крутить!';d.appendChild(spinBtn);return d;
}

      const alert=el('div',{css:'background:rgba(255,214,10,.12);border:2px solid var(--gold);border-radius:16px;padding:16px;text-align:center;margin-bottom:16px;animation:pulse 1.5s ease-in-out infinite;'});
      alert.appendChild(el('div',{css:'font-size:18px;font-weight:800;color:var(--gold);'},['💰 ПОДТВЕРДИТЕ ОПЛАТУ']));
      alert.appendChild(el('div',{css:'font-size:13px;color:var(--txt2);margin-top:4px;'},['Клиент сообщил об оплате по заказу №'+ordId]));
      scr.appendChild(alert);

      const btnRow=el('div',{css:'display:flex;gap:10px;'});
      const confB=el('button',{cls:'btn-prim',css:'flex:1;',onClick:async()=>{
        setLocalOrderState(ordId,{payState:'confirmed'});
        o.status='Доставляется';o.payState='confirmed';
        addLog('Оплата подтверждена по заказу №'+ordId,'');
        notifyAdmin({action:'order_confirmed',orderId:String(ordId)});
        // Начисляем баллы когда закрываем через ЗАКРЫТ, не здесь
        save();showNotif('Оплата подтверждена!','✅');S.adminDetail=null;render();
      }});
      confB.textContent='✅ Деньги получены';

      const cancelB=el('button',{
        css:'flex:1;padding:17px;border-radius:20px;border:1px solid rgba(255,55,95,.4);background:rgba(255,55,95,.1);color:var(--pink);font-size:16px;font-weight:700;cursor:pointer;',
        onClick:async()=>{
          setLocalOrderState(ordId,{payState:'cancelled'});
          o.status='Отменён';o.payState='cancelled';
          addLog('Оплата отклонена по заказу №'+ordId,'');
          save();showNotif('Заказ отменён','❌');S.adminDetail=null;render();
        }});
      cancelB.textContent='❌ Отменить';
      btnRow.appendChild(confB);btnRow.appendChild(cancelB);scr.appendChild(btnRow);
    }

    // ── РЕКВИЗИТЫ ОТПРАВЛЕНЫ, ЖДЁМ ОПЛАТЫ ──
    else if(payState==='requisites_sent'){
      const hd=el('div',{css:'background:rgba(74,181,255,.1);border:1px solid rgba(74,181,255,.3);border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;'});
      hd.appendChild(el('div',{css:'font-size:15px;font-weight:700;color:var(--blue);'},['⏳ Ожидаем оплату от клиента']));
      scr.appendChild(hd);
      // Кнопки смены статуса
      buildOrderStatusButtons(scr,o,ordId);
    }

    // ── ЗАКАЗ ЗАКРЫТ/ОТМЕНЁН ──
    else{
      const c=ORDER_COLORS[o.status]||['var(--txt2)','rgba(128,128,128,.1)'];
      const hd=el('div',{css:'background:'+c[1]+';border:1px solid '+c[0]+'44;border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;'});
      hd.appendChild(el('div',{css:'font-size:15px;font-weight:700;color:'+c[0]+';'},[clientStatus(o.status)]));
      scr.appendChild(hd);
      buildOrderStatusButtons(scr,o,ordId);
    }
    return;
  }

  // ── СПИСОК ЗАКАЗОВ ──────────────────────────────────────────────────────
  // Таб: Текущие / Архив
  if(S._ordTab===undefined)S._ordTab=0;
  const tabRow=el('div',{css:'display:flex;gap:8px;margin-bottom:14px;'});
  [['Текущие',0],['Архив',1]].forEach(([lb,i])=>{
    const b=el('div',{cls:'fpill'+(S._ordTab===i?' on':''),css:'position:relative;',
      onClick:()=>{S._ordTab=i;render();}});
    b.textContent=lb;
    // Красный badge если есть заказы требующие внимания
    if(i===0){
      const needAction=S.orders.filter(o=>{
        const ps=o.payState||'';
        return ps==='waiting_requisites'||ps==='paid';
      }).length;
      if(needAction>0){
        b.appendChild(el('div',{css:'position:absolute;top:-4px;right:-4px;background:#ff375f;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;'},[String(needAction)]));
      }
    }
    tabRow.appendChild(b);
  });
  scr.appendChild(tabRow);

  const current=S._ordTab===0;
  const now=Date.now();const sixMo=6*30*24*3600*1000;
  const items=S.orders.filter(o=>{
    const arch=['ЗАКРЫТ','ОТМЕНЁН','Завершён','Отменён'].includes(o.status);
    if(current) return !arch;
    return arch&&(!o.ts||(now-o.ts)<sixMo);
  });

  if(!items.length){
    scr.appendChild(el('div',{css:'text-align:center;padding:40px;color:var(--txt3);font-size:14px;'},
      [current?'Нет активных заказов':'Архив пуст']));
    return;
  }

  items.forEach(o=>{
    const ps=o.payState||'';
    const needsAction=ps==='waiting_requisites'||ps==='paid';
    const st=clientStatus(o.status);
    const c=ORDER_COLORS[o.status]||ORDER_COLORS[st]||['var(--txt3)','rgba(128,128,128,.1)'];

    const card=el('div',{
      css:'background:rgba(255,255,255,.05);border:1.5px solid '+(needsAction?'var(--gold)':'rgba(255,255,255,.08)')+';border-radius:18px;padding:14px;margin-bottom:10px;cursor:pointer;position:relative;'+(needsAction?'box-shadow:0 0 20px rgba(255,214,10,.15);animation:pulse 2s ease-in-out infinite;':''),
      onClick:()=>{S.adminDetail={_orderId:o.id};render();}
    });

    // Красная полоска если требует внимания
    if(needsAction){
      const dot=el('div',{css:'position:absolute;top:12px;right:12px;width:10px;height:10px;border-radius:50%;background:#ff375f;box-shadow:0 0 8px rgba(255,55,95,.6);'});
      card.appendChild(dot);
    }

    const top=el('div',{css:'display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;'});
    top.appendChild(el('span',{css:'font-size:14px;font-weight:700;'},['Заказ №'+o.id+' · '+o.date]));
    top.appendChild(el('span',{css:'font-size:13px;font-weight:800;color:var(--accent);'},[o.total.toLocaleString('ru')+' ₽']));
    card.appendChild(top);

    const mid=el('div',{css:'display:flex;justify-content:space-between;align-items:center;'});
    mid.appendChild(el('span',{css:'font-size:12px;color:var(--txt2);'},[o.userName||'—']+' · '+(o.userPhone||'—')));
    const stPill=el('div',{css:'background:'+(needsAction?'rgba(255,214,10,.15)':c[1])+';color:'+(needsAction?'var(--gold)':c[0])+';border-radius:100px;padding:3px 10px;font-size:11px;font-weight:700;'});
    stPill.textContent=needsAction?(ps==='waiting_requisites'?'Нужны реквизиты':'Проверить оплату'):st;
    mid.appendChild(stPill);
    card.appendChild(mid);
    scr.appendChild(card);
  });
}

// Кнопки смены статуса для завершённых заказов
function buildOrderStatusButtons(scr,o,ordId){
  scr.appendChild(el('div',{css:'font-size:12px;color:var(--txt3);font-weight:700;margin-bottom:8px;letter-spacing:.5px;'},['СМЕНИТЬ СТАТУС']));
  const stRow=el('div',{css:'display:flex;gap:5px;flex-wrap:wrap;'});
  ORDER_STATUSES.forEach(st=>{
    const active=o.status===st;
    const b=el('button',{
      css:'padding:6px 12px;border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid '+(active?'var(--accent)':'rgba(255,255,255,.1)')+';background:'+(active?'rgba(191,90,242,.15)':'transparent')+';color:'+(active?'var(--accent)':'var(--txt3)')+';',
      onClick:async()=>{
        const old=o.status;o.status=st;
        addLog('Статус заказа №'+o.id+': '+old+' → '+st,'');
        if(st==='ЗАКРЫТ'&&S.user&&!o._pointsGiven){
          o._pointsGiven=true;
          const earned=Math.floor(o.total*0.05);
          S.user.petals=(S.user.petals||0)+earned;
          addLog('Начислено ☘️'+earned+' (заказ №'+o.id+')','');
          showNotif('Начислено +'+earned+' ☘️');
        }
        if(st==='ОТМЕНЁН'){o.payState='cancelled';setLocalOrderState(o.id,{payState:'cancelled'});}
        save();render();
      }});
    b.textContent=st;stRow.appendChild(b);
  });
  scr.appendChild(stRow);
}

          inp.value='';save();
          // Уведомляем пользователя через бот
          apiCall({action:'admin_reply',chatId:chat.id,msgData:{chatId:chat.id}});
          // Показываем уведомление сверху если пользователь сейчас в приложении
          showNotif('Ответ в чат №'+chat.id+' отправлен','✅');
          render();
        }});sendB.textContent='Отправить';
        scr.appendChild(inp);scr.appendChild(sendB);
      }
      return;
    }
    const row=el('div',{cls:'list-row',onClick:()=>{S.adminDetail=chat.id;render();}});
    const inf=el('div',{css:'flex:1;'});
    inf.appendChild(el('div',{css:'font-size:14px;font-weight:700;'},[chat.topic]));
    const last=chat.msgs[chat.msgs.length-1];
    if(last)inf.appendChild(el('div',{css:'font-size:12px;color:var(--txt2);'},[(last.from==='user'?'Клиент: ':'')+last.text]));
    row.appendChild(el('div',{css:'font-size:20px;margin-right:4px;'},['💬']));row.appendChild(inf);
    row.appendChild(el('span',{css:'font-size:11px;font-weight:700;padding:2px 8px;border-radius:100px;background:'+(chat.status==='Активный'?'rgba(48,209,88,.15)':'rgba(100,100,130,.2)')+';color:'+(chat.status==='Активный'?'var(--green)':'var(--txt3)')+'margin-left:8px;'},[chat.status]));
    scr.appendChild(row);
  });
}

// 1) Читаем параметр реквизитов из URL (?req=base64)
(function checkReqParam(){
  try{
    const urlParams=new URLSearchParams(window.location.search);
    const req=urlParams.get('req');
    if(!req)return;
    const decoded=JSON.parse(atob(req.replace(/-/g,'+').replace(/_/g,'/')));
    if(decoded.t==='req'&&decoded.oid){
      const ordId=Number(decoded.oid)||decoded.oid;
      const order=S.orders.find(o=>String(o.id)===String(decoded.oid));
      if(order){
        const bank=BANKS.find(b=>b.id===decoded.bankId)||BANKS.find(b=>b.name===decoded.bank)||BANKS[0];
        S.checkout={
          step:5, orderId:ordId, total:order.total, disc:order.disc||0,
          receiver:order.receiver||'me', otherName:'', otherPhone:'', addrIdx:0,
          payBank:bank, payPhone:decoded.phone||'—', payName:decoded.name||'—',
          payStatus:null, msgIdx:0, _paidEnabled:true, _deadline:Date.now()+5*60*1000,
        };
        setLocalOrderState(ordId,{payState:'requisites_sent',payBankId:bank.id,payBank:bank.name,payPhone:decoded.phone,payName:decoded.name});
        window.history.replaceState({},'',window.location.pathname);
      }
    }
  }catch(e){}
})();

// 2) Восстанавливаем незавершённый checkout из localStorage
(function restoreCheckout(){
  if(S.checkout)return; // уже установлен из URL
  try{
    const saved=loadCheckout();
    if(!saved||!saved.orderId)return;
    // Проверяем что заказ ещё не завершён
    const order=S.orders.find(o=>String(o.id)===String(saved.orderId));
    if(!order)return;
    if(['Завершён','Отменён','ЗАКРЫТ','ОТМЕНЁН'].includes(order.status)){clearCheckout();return;}
    // Если шаг 4 или 5 — проверяем localStorage state на случай если реквизиты пришли пока не было сети
    if(saved.step===4){
      const ordState=getLocalOrderState(saved.orderId);
      if(ordState&&ordState.payState==='requisites_sent'){
        saved.step=5;
        saved.payBank=BANKS.find(b=>b.id===ordState.payBankId)||BANKS.find(b=>b.name===ordState.payBank)||BANKS[0];
        saved.payPhone=ordState.payPhone||'—';
        saved.payName=ordState.payName||'—';
        saved._paidEnabled=true;
      }
    }
    // НЕ восстанавливаем автоматически — только показываем диалог через таблетку
    // S.checkout = saved; // не делаем — пользователь сам решит через таблетку
  }catch(e){}
})();

render();
</script>
